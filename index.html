      var best = 0, bestD = Infinity;
      for (var k = 0; k < nc; k++) {
        var dr = r - palette[k*3], dg = g2 - palette[k*3+1], db2 = b2 - palette[k*3+2];
        var d = dr*dr + dg*dg + db2*db2;
        if (d < bestD) { bestD = d; best = k; }
      }
      index[i2] = best;
    }
  }
  return index;
}

function GIFEncoder() {
  var buf = new ByteArray();
  var first = true;
  var started = false;
  var width, height;

  return {
    writeFrame: function(index, w, h, opts) {
      opts = opts || {};
      var palette = opts.palette;
      var delay = opts.delay != null ? opts.delay : 10; // cs
      var transparent = opts.transparent != null ? opts.transparent : -1;
      var dispose = opts.dispose != null ? opts.dispose : -1;
      if (!started) {
        width = w; height = h; started = true;
        buf.writeString("GIF89a");
        buf.writeShort(w); buf.writeShort(h);
        buf.writeByte(0); buf.writeByte(0); buf.writeByte(0);
      }
      // Graphic control extension
      buf.writeByte(0x21); buf.writeByte(0xF9); buf.writeByte(4);
      var flags = 0;
      if (transparent >= 0) flags |= 1;
      if (dispose >= 0) flags |= (dispose & 7) << 3;
      buf.writeByte(flags);
      buf.writeShort(delay);
      buf.writeByte(transparent >= 0 ? transparent : 0);
      buf.writeByte(0);
      // Image descriptor
      buf.writeByte(0x2C);
      buf.writeShort(0); buf.writeShort(0);
      buf.writeShort(w); buf.writeShort(h);
      // Local palette
      var palSize = palette ? Math.log2(palette.length / 3) - 1 : 7;
      palSize = Math.max(0, Math.min(7, Math.round(palSize)));
      var numColors = 1 << (palSize + 1);
      buf.writeByte(0x80 | palSize);
      if (palette) {
        var needed = numColors * 3;
        for (var i = 0; i < needed; i++) buf.writeByte(i < palette.length ? palette[i] : 0);
      } else {
        for (var j = 0; j < numColors * 3; j++) buf.writeByte(0);
      }
      // LZW
      var colorDepth = palSize + 1;
      var enc = new LZWEncoder(w, h, index, colorDepth);
      enc.encode(buf);
    },
    finish: function() { buf.writeByte(0x3B); },
    bytes: function() { return buf.toByteArray(); },
    bytesView: function() { return buf.toByteArray(); }
  };
}

// Expose as global
window.gifenc = { quantize, applyPalette, GIFEncoder };

})(window);
</script>

<div class="header"><h1>✨ 創意貼圖設計器</h1></div>

<div class="main-container">

      <button class="mini-btn del" onclick="deleteSelected()">🗑️ 刪除選中</button>
    </div>
    <div class="canvas-wrapper">
      <canvas id="mainCanvas" width="370" height="320"></canvas>
    </div>
    <div style="display:flex;flex-direction:column;gap:10px;width:100%">
      <button class="btn btn-success" onclick="exportPNG()">💾 存檔 PNG（靜態圖）</button>

  </div>

  <div class="sidebar">
    <div class="step-box">
      <span class="step-label">第 1 步</span>
      <button class="btn btn-primary" style="background:#0891b2" onclick="triggerUpload()">📷 選取照片（JPG/PNG）</button>
      <input type="file" id="fileInput" accept="image/*" onchange="handleFileUpload(event)">
      <button class="btn btn-gif" onclick="triggerGifUpload()">🎬 上傳動態 GIF 插圖</button>
      <input type="file" id="gifFileInput" accept="image/gif" onchange="handleGifUpload(event)">
      <div id="gifList"></div>
    </div>

    <div class="step-box">
      <span class="step-label">第 2 步</span>
      <div class="tabs">
        <div class="tab active" onclick="changeTab('ears',this)">耳朵</div>
        <div class="tab" onclick="changeTab('eyes',this)">眼睛</div>
        <div class="tab" onclick="changeTab('noses',this)">鼻子</div>
        <div class="tab" onclick="changeTab('mouths',this)">嘴巴</div>
      </div>
      <div id="asset-container" class="asset-grid"></div>
    </div>

    <div class="step-box">
      <span class="step-label">第 3 步</span>
      <div class="input-row">
        <input type="text" id="textInput" value="早安" placeholder="在這裡打字..." onkeyup="updateActiveText()">
        <input type="color" id="textColor" value="#4f46e5" onchange="updateActiveText()">

      <div style="margin-bottom:10px">
        <button class="btn btn-warning" onclick="triggerFontUpload()">🔠 更換字型</button>

      <button class="btn btn-primary" onclick="addNewText()">➕ 加入一段文字</button>

    <div style="font-size:14px;color:#64748b;text-align:center;font-weight:700;background:#f8fafc;padding:10px;border-radius:12px">
      Billy ^.^ | Program improved by AI @2026
    </div>
  </div>
</div>

<!-- 匯出進度 -->
<div id="exportOverlay">
  <div class="export-card">
    <h2 id="overlayTitle">🎞️ 製作動態 GIF 中…</h2>
    <p id="overlayMsg">正在合成每一幀，請稍候</p>
    <div class="progress-bar-wrap"><div class="progress-bar-fill" id="progressFill"></div></div>
    <div class="progress-label" id="progressLabel">0%</div>
  </div>
</div>

<script>
// ── 素材 ───────────────────────────────────────────────────
const pagesBase = 'https://xxz14701.github.io/addpic02/images/';
const assetManifest = {
  ears:   ['ear_01.png','ear_02.png','ear_03.png','ear_04.png','ear_05.png','ear_06.png','ear_07.png','ear_08.png','ear_09.png','ear_010.png','ear_011.png','ear_012.png','ear_013.png','ear_014.png'],
  eyes:   ['eye_01.png','eye_02.png','eye_03.png','eye_04.png','eye_05.png','eye_06.png','eye_07.png','eye_08.png','eye_09.png','eye_010.png','eye_011.png','eye_012.png','eye_013.png','eye_014.png','eye_015.png','eye_016.png','eye_017.png','eye_018.png','eye_019.png'],
  noses:  ['nose_01.png','nose_02.png','nose_03.png','nose_04.png','nose_05.png'],
  mouths: ['mouth_01.png','mouth_02.png','mouth_03.png','mouth_04.png','mouth_05.png','mouth_06.png','mouth_07.png','mouth_08.png','mouth_09.png','mouth_010.png']
};

// ── GIF 物件 ───────────────────────────────────────────────
const gifObjects = [];
let canvas, customFontCount = 0;

window.onload = () => {
  canvas = new fabric.Canvas('mainCanvas', { preserveObjectStacking: true });
  addNewText();
  renderAssetGrid('ears');
  canvas.on('selection:created', e => onObjectSelected(e.selected[0]));
  canvas.on('selection:updated', e => onObjectSelected(e.selected[0]));
  document.addEventListener('keydown', e => {
    if ((e.key==='Delete'||e.key==='Backspace') && document.activeElement.tagName!=='INPUT') deleteSelected();
  });
};

function onObjectSelected(obj) {
  if (obj?.type==='i-text') {
    document.getElementById('textInput').value = obj.text;
    document.getElementById('textColor').value = obj.fill;
  }
}

function addNewText() {
  const t = new fabric.IText(document.getElementById('textInput').value||'您好', {
    left:185, top:160, originX:'center', originY:'center',
    fontSize:70, fontFamily:'Microsoft JhengHei,sans-serif',
    fill: document.getElementById('textColor').value,
    fontWeight:'bold', cornerColor:'#4f46e5', cornerSize:12, transparentCorners:false
  });
  canvas.add(t); canvas.setActiveObject(t); canvas.renderAll();
}

function updateActiveText() {
  const o = canvas.getActiveObject();
  if (o?.type==='i-text') {
    o.set({ text: document.getElementById('textInput').value, fill: document.getElementById('textColor').value });
    canvas.renderAll();
  }
}

function triggerFontUpload() { document.getElementById('fontInput').click(); }
function handleFontUpload(e) {
  const file = e.target.files[0]; if (!file) return;
  const r = new FileReader();
  r.onload = ev => {
    const name = 'Font'+(customFontCount++);
    new FontFace(name, ev.target.result).load().then(f => {
      document.fonts.add(f);
      const o = canvas.getActiveObject();
      if (o?.type==='i-text') { o.set('fontFamily', name); canvas.renderAll(); }
    });
  };
  r.readAsArrayBuffer(file); e.target.value='';
}

function renderAssetGrid(cat) {
  const c = document.getElementById('asset-container'); c.innerHTML='';
  (assetManifest[cat]||[]).forEach(f => {
    const url = `${pagesBase}${cat}/${f}`;
    const img = document.createElement('img');
    img.src = url; img.className='sticker-item'; img.loading='lazy';
    img.onclick = () => addSticker(url);
    img.onerror = () => img.style.display='none';
    c.appendChild(img);
  });
}
function changeTab(cat, el) {
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active'); renderAssetGrid(cat);
}
function addSticker(url) {
  fabric.Image.fromURL(url, img => {
    img.scale(0.6).set({ left:185, top:160, originX:'center', originY:'center',
      cornerColor:'#4f46e5', cornerSize:12, transparentCorners:false });
    canvas.add(img); canvas.setActiveObject(img); canvas.renderAll();
  }, { crossOrigin:'anonymous' });
}

function triggerUpload() { document.getElementById('fileInput').click(); }
function handleFileUpload(e) {
  const file = e.target.files[0]; if (!file) return;
  const r = new FileReader();
  r.onload = f => {
    fabric.Image.fromURL(f.target.result, img => {
      if (img.width>350) img.scaleToWidth(350);
      img.set({ left:185, top:160, originX:'center', originY:'center' });
      canvas.add(img); canvas.setActiveObject(img); canvas.renderAll();
    });
  };
  r.readAsDataURL(file); e.target.value='';
}

function exportPNG() {
  canvas.discardActiveObject(); canvas.renderAll();
  const a = document.createElement('a');
  a.download='我的創意貼圖.png';
  a.href = canvas.toDataURL({format:'png',quality:1}); a.click();
}

function bringToFront() { const o=canvas.getActiveObject(); if(o){o.bringToFront();canvas.renderAll();} }
function sendToBack()   { const o=canvas.getActiveObject(); if(o){o.sendToBack(); canvas.renderAll();} }
function deleteSelected() {
  const objs = canvas.getActiveObjects(); if (!objs.length) return;
  objs.forEach(o => {
    const idx = gifObjects.findIndex(g=>g.fabricObj===o);
    if (idx!==-1) { clearGifTimer(gifObjects[idx]); gifObjects.splice(idx,1); }
  });
  canvas.remove(...objs); canvas.discardActiveObject(); canvas.renderAll();
  refreshGifList();
}

// ══════════════════════════════════════════════════════════════
//  GIF 上傳、解碼、在 Fabric 動畫
// ══════════════════════════════════════════════════════════════
function triggerGifUpload() { document.getElementById('gifFileInput').click(); }

async function handleGifUpload(e) {
  const file = e.target.files[0]; if (!file) return;
  e.target.value='';
  const buf = await file.arrayBuffer();
  const uint8 = new Uint8Array(buf);
  let gr;
  try { gr = new GifReader(uint8); }
  catch(err) { alert('GIF 解析失敗，請確認是正確的 GIF 檔案\n'+err); return; }

  const W = gr.width, H = gr.height;
  const frames = [], delays = [];

  // 用合成方式逐幀解碼（處理 disposal）
  const compCv = document.createElement('canvas'); compCv.width=W; compCv.height=H;
  const compCtx = compCv.getContext('2d');

  for (let i=0; i<gr.numFrames(); i++) {
    const info = gr.frameInfo(i);
    const pix = new Uint8ClampedArray(W*H*4);
    gr.decodeAndBlitFrameRGBA(i, pix);
    const fc = document.createElement('canvas'); fc.width=W; fc.height=H;
    fc.getContext('2d').putImageData(new ImageData(pix,W,H), 0, 0);
    if (info.disposal===2) compCtx.clearRect(info.x||0, info.y||0, info.width||W, info.height||H);
    compCtx.drawImage(fc, info.x||0, info.y||0);
    const snap = document.createElement('canvas'); snap.width=W; snap.height=H;
    snap.getContext('2d').drawImage(compCv,0,0);
    frames.push(snap);
    delays.push(Math.max(20,(info.delay||10)*10));
  }

  const maxSide=160, sc=Math.min(maxSide/W, maxSide/H, 1);
  const dispW=Math.round(W*sc), dispH=Math.round(H*sc);

  const proxyCv = document.createElement('canvas'); proxyCv.width=dispW; proxyCv.height=dispH;
  const proxyCtx = proxyCv.getContext('2d');
  proxyCtx.drawImage(frames[0],0,0,dispW,dispH);

  const fabricObj = new fabric.Image(proxyCv, {
    left:185, top:160, originX:'center', originY:'center',
    cornerColor:'#4f46e5', cornerSize:12, transparentCorners:false
  });
  canvas.add(fabricObj); canvas.setActiveObject(fabricObj); canvas.renderAll();

  const entry = {
    id:'gif_'+Date.now(), name:file.name,
    frames, delays, srcW:W, srcH:H, dispW, dispH,
    proxyCv, proxyCtx, fabricObj,
    currentFrame:0, timer:null,
    previewUrl: frames[0].toDataURL()
  };
  gifObjects.push(entry);
  startGifAnimation(entry);
  refreshGifList();
}

function startGifAnimation(g) {
  clearGifTimer(g);
  const tick = () => {
    g.currentFrame = (g.currentFrame+1) % g.frames.length;
    g.proxyCtx.clearRect(0,0,g.dispW,g.dispH);
    g.proxyCtx.drawImage(g.frames[g.currentFrame],0,0,g.dispW,g.dispH);
    g.fabricObj.setElement(g.proxyCv);
    canvas.renderAll();
    g.timer = setTimeout(tick, g.delays[g.currentFrame]);
  };
  g.timer = setTimeout(tick, g.delays[0]);
}
function clearGifTimer(g) { if(g.timer){clearTimeout(g.timer);g.timer=null;} }

function refreshGifList() {
  const list = document.getElementById('gifList'); list.innerHTML='';
  gifObjects.forEach(g => {
    const item = document.createElement('div');
    item.className='gif-item';
    item.innerHTML=`<img src="${g.previewUrl}"><span class="gif-item-name">${g.name}</span>
      <button class="gif-item-del" onclick="removeGif('${g.id}',event)">✕</button>`;
    item.onclick = () => { canvas.setActiveObject(g.fabricObj); canvas.renderAll(); };
    list.appendChild(item);
  });
}
function removeGif(id, e) {
  e.stopPropagation();
  const idx = gifObjects.findIndex(g=>g.id===id); if(idx===-1)return;
  clearGifTimer(gifObjects[idx]); canvas.remove(gifObjects[idx].fabricObj);
  canvas.renderAll(); gifObjects.splice(idx,1); refreshGifList();
}

// ══════════════════════════════════════════════════════════════
//  GIF 匯出（gifenc 已完整內嵌，100% 離線可用）
// ══════════════════════════════════════════════════════════════
async function exportGIF() {
  if (!gifObjects.length) {
    alert('您還沒有上傳動態 GIF！\n請先按「上傳動態 GIF 插圖」再使用此功能。\n（靜態存檔請按「存檔 PNG」）');
    return;
  }
  // 暫停所有GIF動畫
  gifObjects.forEach(g=>clearGifTimer(g));
  canvas.discardActiveObject(); canvas.renderAll();

  showOverlay('製作動態 GIF 中…','正在計算幀數');
  await sleep(30);

  const CW=370, CH=320;
  const totalFrames = Math.min(48, lcmAll(gifObjects.map(g=>g.frames.length)));
  const longestMs = Math.max(...gifObjects.map(g=>g.delays.reduce((a,b)=>a+b,0)));
  const frameDelay = Math.max(5, Math.round(longestMs/totalFrames/10)); // cs

  // 截取Fabric靜態層（暫時隱藏所有GIF代理）
  gifObjects.forEach(g=>g.fabricObj.set('opacity',0));
  canvas.renderAll();
  const bgDataUrl = canvas.toDataURL({format:'png',quality:1});
  gifObjects.forEach(g=>g.fabricObj.set('opacity',1));
  canvas.renderAll();
  const bgImg = await loadImage(bgDataUrl);

  const { GIFEncoder, quantize, applyPalette } = window.gifenc;
  const encoder = GIFEncoder();
  const comp = document.createElement('canvas'); comp.width=CW; comp.height=CH;
  const ctx = comp.getContext('2d', {willReadFrequently:true});

  for (let fi=0; fi<totalFrames; fi++) {
    ctx.clearRect(0,0,CW,CH);
    ctx.drawImage(bgImg,0,0);

    for (const g of gifObjects) {
      const frameIdx = fi % g.frames.length;
      const fo = g.fabricObj;
      const m = fo.calcTransformMatrix();
      ctx.save();
      ctx.transform(m[0],m[1],m[2],m[3],m[4],m[5]);
      ctx.drawImage(g.frames[frameIdx], -fo.width/2, -fo.height/2, fo.width, fo.height);
      ctx.restore();
    }

    const px = ctx.getImageData(0,0,CW,CH).data;
    const palette = quantize(px, 256);
    const index = applyPalette(px, palette);
    encoder.writeFrame(index, CW, CH, { palette, delay: frameDelay });

    setProgress(Math.round((fi+1)/totalFrames*100), `合成 ${fi+1}/${totalFrames} 幀`);
    await sleep(0);
  }

  encoder.finish();
  const blob = new Blob([encoder.bytes()], {type:'image/gif'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.download='我的動態貼圖.gif'; a.href=url; a.click();
  setTimeout(()=>URL.revokeObjectURL(url),5000);

  hideOverlay();
  gifObjects.forEach(g=>startGifAnimation(g));
}

// ── 工具 ─────────────────────────────────────────────────────
function showOverlay(t,m){ document.getElementById('overlayTitle').textContent='🎞️ '+t; document.getElementById('overlayMsg').textContent=m; setProgress(0,''); document.getElementById('exportOverlay').classList.add('show'); }
function hideOverlay(){ document.getElementById('exportOverlay').classList.remove('show'); }
function setProgress(p,l){ document.getElementById('progressFill').style.width=p+'%'; document.getElementById('progressLabel').textContent=l||p+'%'; }
function sleep(ms){ return new Promise(r=>setTimeout(r,ms)); }
function loadImage(url){ return new Promise((res,rej)=>{ const i=new Image(); i.onload=()=>res(i); i.onerror=rej; i.src=url; }); }
function gcd(a,b){return b===0?a:gcd(b,a%b);}
function lcm(a,b){return a*b/gcd(a,b);}
function lcmAll(arr){let r=arr[0]||1;for(let i=1;i<arr.length;i++){r=lcm(r,arr[i]);if(r>48)return 48;}return r;}
</script>
