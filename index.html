<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="shortcut icon" href="01.png">
    <title>創意表情設計器</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>
    <style>
        
        :root {
            --primary: #4f46e5;
            --success: #16a34a;
            --danger: #dc2626;
            --warning: #d97706;
            --bg: #f1f5f9;
            --card: #ffffff;
            --text: #0f172a;
        }

        body {
            font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            touch-action: manipulation;
        }

        .header { text-align: center; margin-bottom: 20px; width: 100%; }
        .header h1 { margin: 0; font-size: 28px; color: var(--primary); }
        .header p { color: #475569; margin-top: 5px; font-size: 16px; font-weight: 500; }

        .main-container {
            display: flex;
            gap: 20px;
            max-width: 1100px;
            width: 100%;
            flex-wrap: wrap;
            justify-content: center;
        }

        .canvas-section {
            background: var(--bg);
            padding: 20px;
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            align-items: center;
            flex: 1;
            min-width: 380px;
        }

        .canvas-wrapper {
            border: 4px solid #2b2d30;
            border-radius: 16px;
            overflow: hidden;
            margin-bottom: 20px;
            background-image: 
                linear-gradient(45deg, #f8fafc 25%, transparent 25%), 
                linear-gradient(-45deg, #f8fafc 25%, transparent 25%), 
                linear-gradient(45deg, transparent 75%, #f8fafc 75%), 
                linear-gradient(-45deg, transparent 75%, #f8fafc 75%);
            background-size: 20px 20px;
            background-position: 0 0, 0 10px, 10px -10px, -10px 0px;
            box-shadow: inset 0 2px 10px rgba(0,0,0,0.05);
        }

        .sidebar {
            width: 380px;
            background: var(--card);
            padding: 24px;
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .step-box {
            border: 2px solid #f1f5f9;
            border-radius: 16px;
            padding: 15px;
            position: relative;
        }

        .step-label {
            position: absolute;
            top: -12px;
            left: 15px;
            background: var(--primary);
            color: white;
            padding: 2px 12px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: bold;
        }

        .control-label {
            display: block;
            font-weight: 800;
            margin-bottom: 12px;
            font-size: 18px;
            color: #1e293b;
            margin-top: 5px;
        }

        .input-row { display: flex; gap: 10px; align-items: center; margin-bottom: 10px; }
        
        input[type="text"] {
            flex: 1;
            padding: 12px 15px;
            border: 2px solid #cbd5e1;
            border-radius: 12px;
            font-size: 18px;
        }
        
        input[type="color"] {
            width: 50px;
            height: 50px;
            border: 2px solid #cbd5e1;
            border-radius: 12px;
            cursor: pointer;
            padding: 2px;
        }

        .tabs {
            display: flex;
            gap: 5px;
            background: #f1f5f9;
            padding: 5px;
            border-radius: 12px;
            margin-bottom: 12px;
        }

        .tab {
            flex: 1;
            padding: 10px 5px;
            text-align: center;
            cursor: pointer;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            transition: 0.3s;
            color: #64748b;
        }

        .tab.active { background: var(--primary); color: white; }

        .asset-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            max-height: 250px;
            overflow-y: auto;
            padding: 5px;
        }

        .sticker-item {
            aspect-ratio: 1;
            border: 2px solid #f1f5f9;
            border-radius: 12px;
            cursor: pointer;
            padding: 5px;
            background: #fff;
            transition: 0.2s;
            width: 100%;
        }

        .sticker-item:hover { border-color: var(--primary); background: #eef2ff; }

        .btn {
            padding: 15px 20px;
            border: none;
            border-radius: 16px;
            font-weight: 800;
            font-size: 18px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .btn:active { transform: translateY(2px); box-shadow: none; }

        .btn-primary { background: var(--primary); color: white; }
        .btn-success { background: var(--success); color: white; }
        .btn-warning { background: var(--warning); color: white; }
        .btn-danger { background: var(--danger); color: white; }
        .btn-outline { background: #fff; color: #475569; border: 2px solid #e2e8f0; }

        .layer-controls { display: flex; gap: 10px; margin-bottom: 15px; width: 100%; }
        
        .mini-btn { 
            flex: 1;
            padding: 12px 5px; 
            font-size: 14px; 
            font-weight: bold;
            border-radius: 12px; 
            border: 2px solid #e2e8f0; 
            background: white; 
            cursor: pointer; 
        }

        .mini-btn.del { background: #fff1f2; color: var(--danger); border-color: #fecaca; }

        #fileInput, #fontInput { display: none; }

        @media (max-width: 600px) {
            .sidebar { width: 100%; padding: 15px; }
            .canvas-section { min-width: 100%; padding: 10px; }
            .header h1 { font-size: 24px; }
            .main-container { gap: 10px; }
            .btn { padding: 18px; font-size: 20px; }
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>創意貼圖</h1>
        
    </div>

    <div class="main-container">
        <div class="canvas-section">
            <div class="layer-controls">
                <button class="mini-btn" onclick="bringToFront()">🔼 移到最前面</button>
                <button class="mini-btn" onclick="sendToBack()">🔽 移到最後面</button>
                <button class="mini-btn del" onclick="deleteSelected()">🗑️ 刪除選中</button>
            </div>
            
            <div class="canvas-wrapper">
                <canvas id="mainCanvas" width="370" height="320"></canvas>
            </div>

            <div style="display: flex; flex-direction: column; gap: 12px; width: 100%;">
                <button class="btn btn-success" onclick="exportImage()">💾 完成並存檔 (透明圖)</button>
                
            </div>
        </div>

        <div class="sidebar">
            <div class="step-box">
                <span class="step-label">第 1 步</span>
                
                <button class="btn btn-primary" style="background-color: #0891b2;" onclick="triggerUpload()">📷 選取電腦/手機的照片</button>
                <input type="file" id="fileInput" accept="image/*" onchange="handleFileUpload(event)">
            </div>

            

            <div class="step-box">
                <span class="step-label">第 2 步</span>
                
                <div class="tabs">
                    <div class="tab active" onclick="changeTab('ears', this)">耳朵</div>
                    <div class="tab" onclick="changeTab('eyes', this)">眼睛</div>
                    <div class="tab" onclick="changeTab('noses', this)">鼻子</div>
                    <div class="tab" onclick="changeTab('mouths', this)">嘴巴</div>
                </div>

                <div id="asset-container" class="asset-grid"></div>
            </div>
            <div class="step-box">
                <span class="step-label">第 3 步</span>
                
                <div class="input-row">
                    <input type="text" id="textInput" value="早安" placeholder="在這裡打字..." onkeyup="updateActiveText()">
                    <input type="color" id="textColor" value="#4f46e5" onchange="updateActiveText()">
                </div>
                <div style="margin-bottom: 10px;">
                    <button class="btn btn-warning" onclick="triggerFontUpload()">🔠 更換字型</button>
                    <input type="file" id="fontInput" accept=".ttf,.otf" onchange="handleFontUpload(event)">
                </div>
                <button class="btn btn-primary" onclick="addNewText()">➕ 加入一段文字</button>
            </div>

            <div style="font-size: 14px; color: #64748b; text-align: center; font-weight: bold; background: #f8fafc; padding: 10px; border-radius: 12px;">
                Billy ^.^ | Program improved by AI @2026
            </div>
        </div>
    </div>

    <script>
        // 設定圖片基礎路徑
        const pagesBase = 'https://xxz14701.github.io/addpic02/images/';

        // 【重要】直接定義素材檔案清單，避免呼叫 GitHub API 造成過載封鎖
        // 建議您根據 GitHub images 資料夾內的實際檔名填寫，這裡先預填您提供的部分檔名
        const assetManifest = {
            ears: ['ear_01.png', 'ear_02.png', 'ear_03.png', 'ear_04.png', 'ear_05.png', 'ear_06.png', 'ear_07.png', 'ear_08.png', 'ear_09.png', 'ear_010.png', 'ear_011.png', 'ear_012.png', 'ear_013.png', 'ear_014.png'], 
            eyes: ['eye_01.png', 'eye_02.png', 'eye_03.png', 'eye_04.png', 'eye_05.png', 'eye_06.png', 'eye_07.png', 'eye_08.png', 'eye_09.png', 'eye_010.png', 'eye_011.png', 'eye_012.png', 'eye_013.png', 'eye_014.png', 'eye_015.png', 'eye_016.png', 'eye_017.png', 'eye_018.png', 'eye_019.png'],
            noses: ['nose_01.png', 'nose_02.png', 'nose_03.png', 'nose_04.png', 'nose_05.png'],
            mouths: ['mouth_01.png', 'mouth_02.png', 'mouth_03.png', 'mouth_04.png', 'mouth_05.png', 'mouth_06.png', 'mouth_07.png', 'mouth_08.png', 'mouth_09.png', 'mouth_010.png']
        };

        let canvas;
        let customFontCount = 0;

        window.onload = function() {
            canvas = new fabric.Canvas('mainCanvas', {
                preserveObjectStacking: true
            });
            
            addNewText();
            // 改為手動呼叫，不再使用 API 偵測
            renderAssetGrid('ears');

            canvas.on('selection:created', (e) => onObjectSelected(e.selected[0]));
            canvas.on('selection:updated', (e) => onObjectSelected(e.selected[0]));

            document.addEventListener('keydown', (e) => {
                if ((e.key === 'Delete' || e.key === 'Backspace') && document.activeElement.tagName !== 'INPUT') {
                    deleteSelected();
                }
            });
        };

        function onObjectSelected(obj) {
            if (obj && obj.type === 'i-text') {
                document.getElementById('textInput').value = obj.text;
                document.getElementById('textColor').value = obj.fill;
            }
        }

        function addNewText() {
            const content = document.getElementById('textInput').value || '您好';
            const color = document.getElementById('textColor').value;
            const newText = new fabric.IText(content, {
                left: 185, top: 160,
                originX: 'center', originY: 'center',
                fontSize: 70,
                fontFamily: 'Microsoft JhengHei, sans-serif',
                fill: color,
                fontWeight: 'bold',
                cornerColor: '#00008B', cornerSize: 12,
                transparentCorners: false
            });
            canvas.add(newText);
            canvas.setActiveObject(newText);
            canvas.renderAll();
        }

        function updateActiveText() {
            const activeObj = canvas.getActiveObject();
            if (activeObj && activeObj.type === 'i-text') {
                activeObj.set({ 
                    text: document.getElementById('textInput').value, 
                    fill: document.getElementById('textColor').value 
                });
                canvas.renderAll();
            }
        }

        function triggerFontUpload() { document.getElementById('fontInput').click(); }
        function handleFontUpload(e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(event) {
                const fontName = 'Font' + customFontCount++;
                const fontFace = new FontFace(fontName, event.target.result);
                fontFace.load().then(function(loaded) {
                    document.fonts.add(loaded);
                    const obj = canvas.getActiveObject();
                    if (obj && obj.type === 'i-text') {
                        obj.set('fontFamily', fontName);
                        canvas.renderAll();
                    }
                });
            };
            reader.readAsArrayBuffer(file);
            e.target.value = '';
        }

        // 修改後的素材載入函數：直接從預設清單讀取
        function renderAssetGrid(category) {
            const container = document.getElementById('asset-container');
            container.innerHTML = '';
            
            const files = assetManifest[category];
            if (!files || files.length === 0) {
                container.innerHTML = '<div style="grid-column: span 4; text-align: center;">暫無素材</div>';
                return;
            }

            files.forEach(fileName => {
                const imgUrl = `${pagesBase}${category}/${fileName}`;
                const imgEl = document.createElement('img');
                imgEl.src = imgUrl;
                imgEl.className = 'sticker-item';
                imgEl.loading = 'lazy'; // 延遲載入減少瞬間頻寬佔用
                imgEl.onclick = () => addSticker(imgUrl);
                imgEl.onerror = () => { imgEl.style.display = 'none'; }; // 萬一圖片不存在就隱藏
                container.appendChild(imgEl);
            });
        }

        function changeTab(cat, el) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            el.classList.add('active');
            renderAssetGrid(cat);
        }

        function addSticker(url) {
            fabric.Image.fromURL(url, function(img) {
                img.scale(0.6).set({
                    left: 185, top: 160,
                    originX: 'center', originY: 'center',
                    cornerColor: '#00008B', cornerSize: 12,
                    transparentCorners: false
                });
                canvas.add(img);
                canvas.setActiveObject(img);
                canvas.renderAll();
            }, { crossOrigin: 'anonymous' });
        }

        function triggerUpload() { document.getElementById('fileInput').click(); }
        function handleFileUpload(e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(f) {
                fabric.Image.fromURL(f.target.result, function(img) {
                    if (img.width > 350) img.scaleToWidth(350);
                    img.set({ left: 185, top: 160, originX: 'center', originY: 'center', cornerColor: '#00008B', cornerSize: 12, transparentCorners: false });
                    canvas.add(img);
                    canvas.setActiveObject(img);
                    canvas.renderAll();
                });
            };
            reader.readAsDataURL(file);
            e.target.value = '';
        }

        function exportImage() {
            canvas.discardActiveObject();
            canvas.renderAll();
            const link = document.createElement('a');
            link.download = '我的創意貼圖.png';
            link.href = canvas.toDataURL({ format: 'png', quality: 1.0 });
            link.click();
        }

        function bringToFront() {
            const obj = canvas.getActiveObject();
            if (obj) { obj.bringToFront(); canvas.renderAll(); }
        }
        function sendToBack() {
            const obj = canvas.getActiveObject();
            if (obj) { obj.sendToBack(); canvas.renderAll(); }
        }
        function deleteSelected() {
            const actives = canvas.getActiveObjects();
            if (actives.length > 0) {
                canvas.remove(...actives);
                canvas.discardActiveObject();
                canvas.renderAll();
            }
        }
        function resetCanvas() {
            if(confirm('確定要全部刪除重新開始嗎？')) {
                canvas.clear();
                canvas.renderAll();
            }
        }
    </script>
</body>
</html>
