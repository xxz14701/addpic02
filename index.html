<script>
/* GifDecoder - pure JS GIF89a decoder, no external deps */
function GifDecoder(u8){
  if(u8[0]!==71||u8[1]!==73||u8[2]!==70)throw new Error('不是有效的 GIF 檔案');
  var p=6,SW=u8[p]|(u8[p+1]<<8),SH=u8[p+2]|(u8[p+3]<<8);p+=4;
  var pk=u8[p++];p+=2;
  var gpal=null;
  if(pk>>7){var n=3*(2<<(pk&7));gpal=u8.slice(p,p+n);p+=n;}
  this.width=SW;this.height=SH;
  var frames=[],gcD=0,gcT=-1,gcDis=0;
  while(p<u8.length){
    var m=u8[p++];
    if(m===0x3B)break;
    if(m===0x21){
      var lbl=u8[p++];
      if(lbl===0xF9){p++;var f=u8[p++];gcDis=(f>>3)&7;gcD=u8[p]|(u8[p+1]<<8);p+=2;gcT=(f&1)?u8[p++]:(p++,-1);p++;}
      else{while(true){var s=u8[p++];if(s===0)break;p+=s;}}
      continue;
    }
    if(m!==0x2C)continue;
    var fx=u8[p]|(u8[p+1]<<8);p+=2;var fy=u8[p]|(u8[p+1]<<8);p+=2;
    var fw=u8[p]|(u8[p+1]<<8);p+=2;var fh=u8[p]|(u8[p+1]<<8);p+=2;
    var fp=u8[p++];var lpal=null;
    if(fp>>7){var ln=3*(2<<(fp&7));lpal=u8.slice(p,p+ln);p+=ln;}
    var pal=lpal||gpal,mc=u8[p++],raw=[];
    while(true){var bs=u8[p++];if(bs===0)break;for(var i=0;i<bs;i++)raw.push(u8[p++]);}
    frames.push({x:fx,y:fy,w:fw,h:fh,pal:pal,ti:gcT,delay:Math.max(20,gcD*10),dis:gcDis,mc:mc,raw:new Uint8Array(raw)});
    gcD=0;gcT=-1;gcDis=0;
  }
  var decoded=null;
  this.getFrames=function(){
    if(decoded)return decoded;
    decoded=[];
    var cc=document.createElement('canvas');cc.width=SW;cc.height=SH;
    var cx=cc.getContext('2d');
    for(var fi=0;fi<frames.length;fi++){
      var fr=frames[fi];
      var idx=gifLZW(fr.raw,fr.mc,fr.w*fr.h);
      var rgba=new Uint8ClampedArray(fr.w*fr.h*4);
      for(var j=0;j<idx.length;j++){
        var ci=idx[j];
        if(fr.ti>=0&&ci===fr.ti){rgba[j*4+3]=0;continue;}
        rgba[j*4]=fr.pal[ci*3];rgba[j*4+1]=fr.pal[ci*3+1];rgba[j*4+2]=fr.pal[ci*3+2];rgba[j*4+3]=255;
      }
      if(fi>0&&decoded[fi-1]&&decoded[fi-1].dis===2){var pf=frames[fi-1];cx.clearRect(pf.x,pf.y,pf.w,pf.h);}
      var pc=document.createElement('canvas');pc.width=fr.w;pc.height=fr.h;
      pc.getContext('2d').putImageData(new ImageData(rgba,fr.w,fr.h),0,0);
      cx.drawImage(pc,fr.x,fr.y);
      var sc=document.createElement('canvas');sc.width=SW;sc.height=SH;
      sc.getContext('2d').drawImage(cc,0,0);
      decoded.push({canvas:sc,delay:fr.delay,dis:fr.dis});
    }
    return decoded;
  };
}
function gifLZW(data,mc,np){
  var cc=1<<mc,eof=cc+1,cs=mc+1,cm=(1<<cs)-1,fc=eof+1;
  var tbl=[],i;for(i=0;i<cc;i++)tbl[i]=[i];tbl[cc]=[];tbl[eof]=[];
  var out=new Uint8Array(np),op=0,buf=0,bl=0,dp=0,prev=null;
  function rc(){while(bl<cs){if(dp>=data.length)return eof;buf|=data[dp++]<<bl;bl+=8;}var c=buf&cm;buf>>=cs;bl-=cs;return c;}
  while(op<np){
    var code=rc();
    if(code===eof)break;
    if(code===cc){tbl.length=eof+1;fc=eof+1;cs=mc+1;cm=(1<<cs)-1;prev=null;continue;}
    var entry;
    if(code<tbl.length)entry=tbl[code];
    else if(prev&&code===fc)entry=prev.concat(prev[0]);
    else break;
    for(var k=0;k<entry.length&&op<np;k++)out[op++]=entry[k];
    if(prev!==null&&fc<4096){tbl[fc++]=prev.concat(entry[0]);if(fc>(1<<cs)&&cs<12){cs++;cm=(1<<cs)-1;}}
    prev=entry;
  }
  return out;
}
</script>
<script>
/* GifBuilder - pure JS GIF encoder with NeuQuant */
var GifBuilder=(function(){
  function nq(rgb,sf){
    sf=sf||10;var N=256,net=[],ni=new Int32Array(256),bias=new Int32Array(N),freq=new Int32Array(N),rp=new Int32Array(32);
    var ib=65536,gs=10,bta=(ib>>10),btg=ib<<(10-10),nbs=4,ra=64,ara=65536,ialp=1024,rdec=30;
    for(var i=0;i<N;i++){var v=(i<<(nbs+8))/N;net[i]=[v,v,v,i];freq[i]=(ib/N)|0;bias[i]=0;}
    function con(b,g,r){var bd=2147483647,bb=bd,bp=-1,bbp=-1;for(var i=0;i<N;i++){var n=net[i],d=Math.abs(n[0]-b)+Math.abs(n[1]-g)+Math.abs(n[2]-r);if(d<bd){bd=d;bp=i;}var bd2=d-(bias[i]>>(16-nbs));if(bd2<bb){bb=bd2;bbp=i;}freq[i]-=freq[i]>>5;bias[i]+=freq[i]<<gs;}freq[bp]+=bta;bias[bp]-=btg;return bbp;}
    function als(al,i,b,g,r){net[i][0]-=(al*(net[i][0]-b))/ialp;net[i][1]-=(al*(net[i][1]-g))/ialp;net[i][2]-=(al*(net[i][2]-r))/ialp;}
    function aln(rd,i,b,g,r){var lo=Math.max(i-rd,0),hi=Math.min(i+rd,N);for(var j=i+1,k=i-1,m=1;j<hi||k>lo;m++){var a=rp[Math.min(m,31)];if(j<hi){net[j][0]-=(a*(net[j][0]-b))/ara;net[j][1]-=(a*(net[j][1]-g))/ara;net[j][2]-=(a*(net[j][2]-r))/ara;j++;}if(k>lo){net[k][0]-=(a*(net[k][0]-b))/ara;net[k][1]-=(a*(net[k][1]-g))/ara;net[k][2]-=(a*(net[k][2]-r))/ara;k--;}}}
    var lc=rgb.length,sp=Math.max(1,(lc/3/sf)|0),dl=Math.max(1,(sp/100)|0),alp=ialp;
    var rad=Math.floor(N/8)*64,rd2=(rad>>6);if(rd2<=1)rd2=0;
    for(var i=0;i<Math.min(rd2,32);i++)rp[i]=Math.floor(alp*((rd2*rd2-i*i)*ra/(rd2*rd2)));
    var step=lc%499?3*499:lc%491?3*491:lc%487?3*487:3*503;
    for(var px=0,cnt=0;cnt<sp;cnt++){
      var b2=(rgb[px]&255)<<nbs,g2=(rgb[px+1]&255)<<nbs,r2=(rgb[px+2]&255)<<nbs;
      var j2=con(b2,g2,r2);als(alp,j2,b2,g2,r2);if(rd2>0)aln(rd2,j2,b2,g2,r2);
      px+=step;if(px>=lc)px-=lc;
      if(cnt%dl===0){alp-=alp/30;rad-=rad/rdec;rd2=rad>>6;if(rd2<=1)rd2=0;for(var i=0;i<Math.min(rd2,32);i++)rp[i]=Math.floor(alp*((rd2*rd2-i*i)*ra/(rd2*rd2)));}
    }
    for(var i=0;i<N;i++){net[i][0]>>=nbs;net[i][1]>>=nbs;net[i][2]>>=nbs;}
    var pv=0,ss=0;
    for(var i=0;i<N;i++){var sm=i,sv=net[i][1];for(var j=i+1;j<N;j++)if(net[j][1]<sv){sm=j;sv=net[j][1];}if(i!==sm){var t=net[i];net[i]=net[sm];net[sm]=t;}if(sv!==pv){ni[pv]=(ss+i)>>1;for(var k=pv+1;k<sv;k++)ni[k]=i;pv=sv;ss=i;}}
    ni[pv]=(ss+N-1)>>1;for(var j=pv+1;j<256;j++)ni[j]=N-1;
    return {
      pal:function(){var m=new Uint8Array(N*3),idx=new Array(N);for(var i=0;i<N;i++)idx[net[i][3]]=i;for(var l=0;l<N;l++){var j2=idx[l];m[l*3]=net[j2][0];m[l*3+1]=net[j2][1];m[l*3+2]=net[j2][2];}return m;},
      map:function(r,g,b){var bd=1000,best=-1,i=ni[g],j=i-1;while(i<N||j>=0){if(i<N){var p=net[i],d=Math.abs(p[1]-g);if(d>=bd)i=N;else{d+=Math.abs(p[0]-b)+Math.abs(p[2]-r);if(d<bd){bd=d;best=p[3];}i++;}}if(j>=0){var q=net[j],d=Math.abs(q[1]-g);if(d>=bd)j=-1;else{d+=Math.abs(q[0]-b)+Math.abs(q[2]-r);if(d<bd){bd=d;best=q[3];}j--;}}}return best;}
    };
  }
  function lzwEnc(idx){
    var mc=8,cc=256,eof=257,cs=9,cm=511,fc=258,tbl={},out=[],bb=0,bl=0;
    function emit(c){bb|=c<<bl;bl+=cs;while(bl>=8){out.push(bb&255);bb>>=8;bl-=8;}}
    function reset(){tbl={};fc=258;cs=9;cm=511;}
    emit(cc);
    var prev=idx[0]&255;
    for(var i=1;i<idx.length;i++){
      var cur=idx[i]&255,key=prev+'_'+cur;
      if(tbl[key]!==undefined){prev=tbl[key];}
      else{emit(prev);if(fc<4096){tbl[key]=fc++;if(fc>(1<<cs)&&cs<12){cs++;cm=(1<<cs)-1;}}else{emit(cc);reset();}prev=cur;}
    }
    emit(prev);emit(eof);if(bl>0)out.push(bb&255);
    return new Uint8Array(out);
  }
  return {
    encode:function(frames,W,H){
      var d=[];
      function b(v){d.push(v&255);}
      function w(v){d.push(v&255);d.push((v>>8)&255);}
      function str(s){for(var i=0;i<s.length;i++)d.push(s.charCodeAt(i)&255);}
      function blk(arr){var i=0;while(i<arr.length){var n=Math.min(255,arr.length-i);d.push(n);for(var j=0;j<n;j++)d.push(arr[i++]&255);}d.push(0);}
      str('GIF89a');w(W);w(H);b(0x70);b(0);b(0);
      b(0x21);b(0xFF);b(11);str('NETSCAPE2.0');b(3);b(1);w(0);b(0);
      var tc=document.createElement('canvas');tc.width=W;tc.height=H;
      var tx=tc.getContext('2d',{willReadFrequently:true});
      for(var fi=0;fi<frames.length;fi++){
        var fr=frames[fi];
        tx.clearRect(0,0,W,H);tx.drawImage(fr.canvas,0,0,W,H);
        var id=tx.getImageData(0,0,W,H).data,np=W*H;
        var rgb=new Uint8Array(np*3);
        for(var i=0;i<np;i++){rgb[i*3]=id[i*4];rgb[i*3+1]=id[i*4+1];rgb[i*3+2]=id[i*4+2];}
        var q=nq(rgb,10),pal=q.pal(),pidx=new Uint8Array(np);
        for(var i=0;i<np;i++)pidx[i]=q.map(id[i*4],id[i*4+1],id[i*4+2]);
        var dc=Math.max(2,Math.round(fr.delay/10));
        b(0x21);b(0xF9);b(4);b(0);w(dc);b(0);b(0);
        b(0x2C);w(0);w(0);w(W);w(H);b(0x87);
        for(var i=0;i<256*3;i++)b(i<pal.length?pal[i]:0);
        b(8);blk(lzwEnc(pidx));
      }
      b(0x3B);
      return new Uint8Array(d);
    }
  };
})();
</script>
<style>
:root{--pr:#4f46e5;--ok:#16a34a;--er:#dc2626;--wa:#d97706;--bg:#f1f5f9;--cd:#fff;--tx:#0f172a}
*{box-sizing:border-box}
body{font-family:'PingFang TC','Microsoft JhengHei',sans-serif;background:var(--bg);color:var(--tx);margin:0;padding:10px;display:flex;flex-direction:column;align-items:center;touch-action:manipulation}
.hdr{text-align:center;margin-bottom:20px;width:100%}
.hdr h1{margin:0;font-size:28px;color:var(--pr)}
.wrap{display:flex;gap:20px;max-width:1100px;width:100%;flex-wrap:wrap;justify-content:center}
.cs{background:var(--cd);padding:20px;border-radius:24px;box-shadow:0 10px 30px rgba(0,0,0,.1);display:flex;flex-direction:column;align-items:center;flex:1;min-width:380px}
.cb{border:4px solid #e2e8f0;border-radius:16px;overflow:hidden;margin-bottom:20px;background-image:linear-gradient(45deg,#f8fafc 25%,transparent 25%),linear-gradient(-45deg,#f8fafc 25%,transparent 25%),linear-gradient(45deg,transparent 75%,#f8fafc 75%),linear-gradient(-45deg,transparent 75%,#f8fafc 75%);background-size:20px 20px;background-position:0 0,0 10px,10px -10px,-10px 0}
.sb{width:380px;background:var(--cd);padding:24px;border-radius:24px;box-shadow:0 10px 30px rgba(0,0,0,.1);display:flex;flex-direction:column;gap:20px}
.bx{border:2px solid #f1f5f9;border-radius:16px;padding:15px;position:relative}
.bl{position:absolute;top:-12px;left:15px;background:var(--pr);color:#fff;padding:2px 12px;border-radius:20px;font-size:14px;font-weight:700}
.ir{display:flex;gap:10px;align-items:center;margin-bottom:10px}
input[type=text]{flex:1;padding:12px 15px;border:2px solid #cbd5e1;border-radius:12px;font-size:18px}
input[type=color]{width:50px;height:50px;border:2px solid #cbd5e1;border-radius:12px;cursor:pointer;padding:2px}
.tabs{display:flex;gap:5px;background:#f1f5f9;padding:5px;border-radius:12px;margin-bottom:12px}
.tab{flex:1;padding:10px 5px;text-align:center;cursor:pointer;border-radius:8px;font-size:16px;font-weight:700;color:#64748b;transition:.3s}
.tab.active{background:var(--pr);color:#fff}
.ag{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;max-height:250px;overflow-y:auto;padding:5px}
.sit{aspect-ratio:1;border:2px solid #f1f5f9;border-radius:12px;cursor:pointer;padding:5px;background:#fff;width:100%;object-fit:contain;transition:.2s}
.sit:hover{border-color:var(--pr);background:#eef2ff}
.btn{padding:15px 20px;border:none;border-radius:16px;font-weight:800;font-size:18px;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:10px;width:100%;box-shadow:0 4px 6px rgba(0,0,0,.1);margin-bottom:6px}
.btn:last-child{margin-bottom:0}
.btn:active{transform:translateY(2px);box-shadow:none}
.bpr{background:var(--pr);color:#fff}.bok{background:var(--ok);color:#fff}.bwa{background:var(--wa);color:#fff}
.bgif{background:linear-gradient(135deg,#f43f5e,#a855f7,#3b82f6);color:#fff;margin-top:8px}
.bexp{background:linear-gradient(135deg,#4f46e5,#a855f7);color:#fff}
.lcs{display:flex;gap:10px;margin-bottom:15px;width:100%}
.mb{flex:1;padding:12px 5px;font-size:14px;font-weight:700;border-radius:12px;border:2px solid #e2e8f0;background:#fff;cursor:pointer}
.mb.dl{background:#fff1f2;color:var(--er);border-color:#fecaca}
#fi,#gfi,#fni{display:none}
#gl{display:flex;flex-direction:column;gap:6px;margin-top:8px;max-height:160px;overflow-y:auto}
.gi{display:flex;align-items:center;gap:8px;background:#f8fafc;border:2px solid #e2e8f0;border-radius:10px;padding:6px 10px;cursor:pointer;transition:.2s}
.gi:hover{border-color:var(--pr)}
.gi img{width:40px;height:40px;object-fit:contain;border-radius:6px;background:#fff}
.gin{flex:1;font-size:12px;color:#475569;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.gid{background:#fee2e2;border:none;border-radius:6px;color:var(--er);font-size:14px;cursor:pointer;padding:3px 7px}
#ov{display:none;position:fixed;inset:0;background:rgba(15,23,42,.8);z-index:9999;align-items:center;justify-content:center}
#ov.show{display:flex}
.ovc{background:#fff;border-radius:24px;padding:40px 50px;text-align:center;max-width:340px;width:90%}
.ovc h2{margin:0 0 6px;font-size:22px;color:#1e293b}
.ovc p{margin:0 0 20px;color:#64748b;font-size:14px}
.pb{background:#f1f5f9;border-radius:99px;height:16px;overflow:hidden}
.pbf{height:100%;background:linear-gradient(90deg,#4f46e5,#a855f7);border-radius:99px;transition:width .15s;width:0%}
.pbl{font-size:13px;color:#64748b;margin-top:8px;font-weight:600}
@media(max-width:600px){.sb{width:100%;padding:15px}.cs{min-width:100%;padding:10px}.wrap{gap:10px}.btn{padding:18px;font-size:20px}}
</style>
</head>
<body>
<div class="hdr"><h1>✨ 創意貼圖設計器</h1></div>
<div class="wrap">
  <div class="cs">
    <div class="lcs">
      <button class="mb" onclick="bF()">🔼 移到最前</button>
      <button class="mb" onclick="bB()">🔽 移到最後</button>
      <button class="mb dl" onclick="bDel()">🗑️ 刪除選中</button>
    </div>
    <div class="cb"><canvas id="mc" width="370" height="320"></canvas></div>
    <div style="display:flex;flex-direction:column;gap:10px;width:100%">
      <button class="btn bok" onclick="ePNG()">💾 存檔 PNG（靜態圖）</button>
      <button class="btn bexp" onclick="eGIF()">🎞️ 存檔 GIF（保留動態！）</button>
    </div>
  </div>
  <div class="sb">
    <div class="bx">
      <span class="bl">第 1 步</span>
      <button class="btn bpr" style="background:#0891b2" onclick="document.getElementById('fi').click()">📷 選取照片（JPG/PNG）</button>
      <input type="file" id="fi" accept="image/*" onchange="upPhoto(event)">
      <button class="btn bgif" onclick="document.getElementById('gfi').click()">🎬 上傳動態 GIF 插圖</button>
      <input type="file" id="gfi" accept="image/gif" onchange="upGIF(event)">
      <div id="gl"></div>
    </div>
    <div class="bx">
      <span class="bl">第 2 步</span>
      <div class="tabs">
        <div class="tab active" onclick="chTab('ears',this)">耳朵</div>
        <div class="tab" onclick="chTab('eyes',this)">眼睛</div>
        <div class="tab" onclick="chTab('noses',this)">鼻子</div>
        <div class="tab" onclick="chTab('mouths',this)">嘴巴</div>
      </div>
      <div id="ag" class="ag"></div>
    </div>
    <div class="bx">
      <span class="bl">第 3 步</span>
      <div class="ir">
        <input type="text" id="ti" value="早安" placeholder="在這裡打字..." onkeyup="upTxt()">
        <input type="color" id="tc" value="#4f46e5" onchange="upTxt()">
      </div>
      <div style="margin-bottom:10px">
        <button class="btn bwa" onclick="document.getElementById('fni').click()">🔠 更換字型</button>
        <input type="file" id="fni" accept=".ttf,.otf" onchange="upFont(event)">
      </div>
      <button class="btn bpr" onclick="addTxt()">➕ 加入一段文字</button>
    </div>
    <div style="font-size:14px;color:#64748b;text-align:center;font-weight:700;background:#f8fafc;padding:10px;border-radius:12px">
      Billy ^.^ | Program improved by AI @2026
    </div>
  </div>
</div>
<div id="ov">
  <div class="ovc">
    <h2 id="ot">🎞️ 製作 GIF 中…</h2>
    <p id="om">正在合成幀數</p>
    <div class="pb"><div class="pbf" id="pf"></div></div>
    <div class="pbl" id="pl">0%</div>
  </div>
</div>
<script>
var BASE='https://xxz14701.github.io/addpic02/images/';
var AM={
  ears:['ear_01.png','ear_02.png','ear_03.png','ear_04.png','ear_05.png','ear_06.png','ear_07.png','ear_08.png','ear_09.png','ear_010.png','ear_011.png','ear_012.png','ear_013.png','ear_014.png'],
  eyes:['eye_01.png','eye_02.png','eye_03.png','eye_04.png','eye_05.png','eye_06.png','eye_07.png','eye_08.png','eye_09.png','eye_010.png','eye_011.png','eye_012.png','eye_013.png','eye_014.png','eye_015.png','eye_016.png','eye_017.png','eye_018.png','eye_019.png'],
  noses:['nose_01.png','nose_02.png','nose_03.png','nose_04.png','nose_05.png'],
  mouths:['mouth_01.png','mouth_02.png','mouth_03.png','mouth_04.png','mouth_05.png','mouth_06.png','mouth_07.png','mouth_08.png','mouth_09.png','mouth_010.png']
};
var gObjs=[],cv,fCnt=0;

window.onload=function(){
  cv=new fabric.Canvas('mc',{preserveObjectStacking:true});
  addTxt();drawGrid('ears');
  cv.on('selection:created',function(e){onSel(e.selected[0]);});
  cv.on('selection:updated',function(e){onSel(e.selected[0]);});
  document.addEventListener('keydown',function(e){
    if((e.key==='Delete'||e.key==='Backspace')&&document.activeElement.tagName!=='INPUT')bDel();
  });
};
function onSel(o){if(o&&o.type==='i-text'){document.getElementById('ti').value=o.text;document.getElementById('tc').value=o.fill;}}
function addTxt(){
  var t=new fabric.IText(document.getElementById('ti').value||'您好',{
    left:185,top:160,originX:'center',originY:'center',fontSize:70,
    fontFamily:'Microsoft JhengHei,sans-serif',fill:document.getElementById('tc').value,
    fontWeight:'bold',cornerColor:'#4f46e5',cornerSize:12,transparentCorners:false
  });
  cv.add(t);cv.setActiveObject(t);cv.renderAll();
}
function upTxt(){var o=cv.getActiveObject();if(o&&o.type==='i-text'){o.set({text:document.getElementById('ti').value,fill:document.getElementById('tc').value});cv.renderAll();}}
function upFont(e){
  var f=e.target.files[0];if(!f)return;
  var r=new FileReader();
  r.onload=function(ev){var nm='F'+(fCnt++);new FontFace(nm,ev.target.result).load().then(function(ff){document.fonts.add(ff);var o=cv.getActiveObject();if(o&&o.type==='i-text'){o.set('fontFamily',nm);cv.renderAll();}});};
  r.readAsArrayBuffer(f);e.target.value='';
}
function drawGrid(cat){
  var c=document.getElementById('ag');c.innerHTML='';
  (AM[cat]||[]).forEach(function(f){
    var url=BASE+cat+'/'+f,img=document.createElement('img');
    img.src=url;img.className='sit';img.loading='lazy';
    img.onclick=function(){addSt(url);};
    img.onerror=function(){img.style.display='none';};
    c.appendChild(img);
  });
}
function chTab(cat,el){document.querySelectorAll('.tab').forEach(function(t){t.classList.remove('active');});el.classList.add('active');drawGrid(cat);}
function addSt(url){fabric.Image.fromURL(url,function(img){img.scale(0.6).set({left:185,top:160,originX:'center',originY:'center',cornerColor:'#4f46e5',cornerSize:12,transparentCorners:false});cv.add(img);cv.setActiveObject(img);cv.renderAll();},{crossOrigin:'anonymous'});}
function upPhoto(e){var f=e.target.files[0];if(!f)return;var r=new FileReader();r.onload=function(ev){fabric.Image.fromURL(ev.target.result,function(img){if(img.width>350)img.scaleToWidth(350);img.set({left:185,top:160,originX:'center',originY:'center'});cv.add(img);cv.setActiveObject(img);cv.renderAll();});};r.readAsDataURL(f);e.target.value='';}
function ePNG(){cv.discardActiveObject();cv.renderAll();var a=document.createElement('a');a.download='創意貼圖.png';a.href=cv.toDataURL({format:'png',quality:1});a.click();}
function bF(){var o=cv.getActiveObject();if(o){o.bringToFront();cv.renderAll();}}
function bB(){var o=cv.getActiveObject();if(o){o.sendToBack();cv.renderAll();}}
function bDel(){
  var os=cv.getActiveObjects();if(!os.length)return;
  os.forEach(function(o){var i=gObjs.findIndex(function(g){return g.fo===o;});if(i!==-1){clrT(gObjs[i]);gObjs.splice(i,1);}});
  cv.remove.apply(cv,os);cv.discardActiveObject();cv.renderAll();rfList();
}
function upGIF(e){
  var f=e.target.files[0];if(!f)return;e.target.value='';
  var r=new FileReader();
  r.onload=function(ev){
    var u8=new Uint8Array(ev.target.result),dec;
    try{dec=new GifDecoder(u8);}catch(err){alert('GIF 解析失敗：'+err.message);return;}
    var frs=dec.getFrames();
    if(!frs.length){alert('GIF 沒有找到可用的幀');return;}
    var W=dec.width,H=dec.height,ms=160,sc=Math.min(ms/W,ms/H,1);
    var dw=Math.round(W*sc),dh=Math.round(H*sc);
    var pc=document.createElement('canvas');pc.width=dw;pc.height=dh;
    var px=pc.getContext('2d');px.drawImage(frs[0].canvas,0,0,dw,dh);
    var fo=new fabric.Image(pc,{left:185,top:160,originX:'center',originY:'center',cornerColor:'#4f46e5',cornerSize:12,transparentCorners:false});
    cv.add(fo);cv.setActiveObject(fo);cv.renderAll();
    var g={id:'g'+Date.now(),name:f.name,frames:frs,W:W,H:H,dw:dw,dh:dh,pc:pc,px:px,fo:fo,cf:0,t:null,prev:frs[0].canvas.toDataURL()};
    gObjs.push(g);startAnim(g);rfList();
  };
  r.readAsArrayBuffer(f);
}
function startAnim(g){
  clrT(g);
  function tick(){g.cf=(g.cf+1)%g.frames.length;g.px.clearRect(0,0,g.dw,g.dh);g.px.drawImage(g.frames[g.cf].canvas,0,0,g.dw,g.dh);g.fo.setElement(g.pc);cv.renderAll();g.t=setTimeout(tick,g.frames[g.cf].delay);}
  g.t=setTimeout(tick,g.frames[0].delay);
}
function clrT(g){if(g.t){clearTimeout(g.t);g.t=null;}}
function rfList(){
  var l=document.getElementById('gl');l.innerHTML='';
  gObjs.forEach(function(g){
    var d=document.createElement('div');d.className='gi';
    d.innerHTML='<img src="'+g.prev+'"><span class="gin">'+g.name+'</span><button class="gid" onclick="rmGIF(\''+g.id+'\',event)">✕</button>';
    d.onclick=function(){cv.setActiveObject(g.fo);cv.renderAll();};
    l.appendChild(d);
  });
}
function rmGIF(id,e){
  e.stopPropagation();
  var i=gObjs.findIndex(function(g){return g.id===id;});if(i===-1)return;
  clrT(gObjs[i]);cv.remove(gObjs[i].fo);cv.renderAll();gObjs.splice(i,1);rfList();
}
function eGIF(){
  if(!gObjs.length){alert('您還沒有上傳動態 GIF！\n請先按「上傳動態 GIF 插圖」。\n（靜態存檔請按「存檔 PNG」）');return;}
  gObjs.forEach(function(g){clrT(g);});
  cv.discardActiveObject();cv.renderAll();
  showOv('製作 GIF 中…','準備合成幀數…');
  setTimeout(function(){
    try{
      var CW=370,CH=320;
      var tf=Math.min(48,lcmAll(gObjs.map(function(g){return g.frames.length;})));
      var lms=Math.max.apply(null,gObjs.map(function(g){return g.frames.reduce(function(s,f){return s+f.delay;},0);}));
      var fd=Math.max(50,Math.round(lms/tf));
      gObjs.forEach(function(g){g.fo.set('opacity',0);});cv.renderAll();
      var bgUrl=cv.toDataURL({format:'png',quality:1});
      gObjs.forEach(function(g){g.fo.set('opacity',1);});cv.renderAll();
      var bgI=new Image();
      bgI.onload=function(){
        var comp=document.createElement('canvas');comp.width=CW;comp.height=CH;
        var ctx=comp.getContext('2d',{willReadFrequently:true});
        var out=[];
        for(var fi=0;fi<tf;fi++){
          ctx.clearRect(0,0,CW,CH);ctx.drawImage(bgI,0,0);
          gObjs.forEach(function(g){
            var fi2=fi%g.frames.length,fo=g.fo,m=fo.calcTransformMatrix();
            ctx.save();ctx.transform(m[0],m[1],m[2],m[3],m[4],m[5]);
            ctx.drawImage(g.frames[fi2].canvas,-fo.width/2,-fo.height/2,fo.width,fo.height);
            ctx.restore();
          });
          var sc=document.createElement('canvas');sc.width=CW;sc.height=CH;sc.getContext('2d').drawImage(comp,0,0);
          out.push({canvas:sc,delay:fd});
          setPr(Math.round((fi+1)/tf*70),'合成 '+(fi+1)+'/'+tf+' 幀');
        }
        setPr(75,'色彩量化中…');
        setTimeout(function(){
          try{
            var bytes=GifBuilder.encode(out,CW,CH);
            setPr(100,'完成！');
            setTimeout(function(){
              var blob=new Blob([bytes],{type:'image/gif'});
              var url=URL.createObjectURL(blob);
              var a=document.createElement('a');a.download='動態貼圖.gif';a.href=url;a.click();
              setTimeout(function(){URL.revokeObjectURL(url);},5000);
              hideOv();gObjs.forEach(function(g){startAnim(g);});
            },200);
          }catch(e2){hideOv();alert('GIF 編碼失敗：'+e2.message);gObjs.forEach(function(g){startAnim(g);});}
        },30);
      };
      bgI.src=bgUrl;
    }catch(e){hideOv();alert('匯出失敗：'+e.message);gObjs.forEach(function(g){startAnim(g);});}
  },50);
}
function showOv(t,m){document.getElementById('ot').textContent='🎞️ '+t;document.getElementById('om').textContent=m;setPr(0,'');document.getElementById('ov').classList.add('show');}
function hideOv(){document.getElementById('ov').classList.remove('show');}
function setPr(p,l){document.getElementById('pf').style.width=p+'%';document.getElementById('pl').textContent=l||p+'%';}
function gcd(a,b){return b===0?a:gcd(b,a%b);}
function lcm(a,b){return Math.round(a/gcd(a,b)*b);}
function lcmAll(arr){var r=arr[0]||1;for(var i=1;i<arr.length;i++){r=lcm(r,arr[i]);if(r>48)return 48;}return r;}
</script>
