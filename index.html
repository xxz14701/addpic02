<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>創意 GIF 貼圖設計器</title>
    <!-- 基礎庫：建議也下載到本地 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>
    
    <!-- 重要：如果您已經下載了 gifshot.min.js 到相同目錄，請取消下方註解並刪除外連版本 -->
    <!-- <script src="gifshot.min.js"></script> -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gifshot/0.4.5/gifshot.min.js"></script>

    <style>
        :root {
            --primary: #4f46e5;
            --success: #16a34a;
            --bg: #f1f5f9;
            --card: #ffffff;
            --text: #0f172a;
        }

        body {
            font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .header { text-align: center; margin-bottom: 15px; width: 100%; }
        .header h1 { margin: 0; font-size: 24px; color: var(--primary); }

        .main-container {
            display: flex;
            gap: 20px;
            max-width: 1100px;
            width: 100%;
            flex-wrap: wrap;
            justify-content: center;
        }

        .canvas-section {
            background: var(--card);
            padding: 20px;
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            align-items: center;
            flex: 1;
            min-width: 320px;
        }

        .canvas-wrapper {
            border: 4px solid #e2e8f0;
            border-radius: 16px;
            overflow: hidden;
            margin-bottom: 20px;
            position: relative;
            background-color: #fff;
            width: 350px;
            height: 350px;
        }

        .canvas-container {
            z-index: 10 !important;
            position: absolute !important;
            top: 0; left: 0;
        }

        #gifPreview {
            position: absolute;
            top: 0; left: 0;
            width: 350px; height: 350px;
            z-index: 1;
            object-fit: contain;
            pointer-events: none; 
            display: none;
        }

        .sidebar {
            width: 380px;
            background: var(--card);
            padding: 24px;
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .step-box {
            border: 2px solid #f1f5f9;
            border-radius: 16px;
            padding: 15px;
            position: relative;
        }

        .step-label {
            position: absolute;
            top: -12px; left: 15px;
            background: var(--primary);
            color: white;
            padding: 2px 12px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: bold;
        }

        .tabs {
            display: flex; gap: 5px;
            background: #f1f5f9;
            padding: 5px;
            border-radius: 12px;
            margin-bottom: 12px;
        }

        .tab {
            flex: 1; padding: 10px 5px;
            text-align: center; cursor: pointer;
            border-radius: 8px; font-size: 14px;
            font-weight: bold; color: #64748b;
        }

        .tab.active { background: var(--primary); color: white; }

        .asset-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            max-height: 200px;
            overflow-y: auto;
        }

        .sticker-item {
            aspect-ratio: 1;
            border: 2px solid #f1f5f9;
            border-radius: 12px;
            cursor: pointer;
            padding: 5px;
            background: #fff;
            width: 100%;
            object-fit: contain;
        }

        .btn {
            padding: 12px 20px;
            border: none;
            border-radius: 12px;
            font-weight: 800;
            font-size: 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
        }

        .btn-primary { background: var(--primary); color: white; }
        .btn-success { background: var(--success); color: white; }

        #loadingOverlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            color: white;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10000;
        }

        .spinner {
            width: 40px; height: 40px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 10px;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .mini-btn { 
            flex: 1; padding: 8px; font-size: 12px; 
            border-radius: 8px; border: 1px solid #ddd; 
            background: #fff; cursor: pointer; 
        }
    </style>
</head>
<body>

    <div id="loadingOverlay">
        <div class="spinner"></div>
        <div id="loadingText">正在處理中...</div>
    </div>

    <div class="header">
        <h1>創意貼圖設計</h1>
    </div>

    <div class="main-container">
        <div class="canvas-section">
            <div style="display:flex; gap:5px; width:100%; margin-bottom:10px;">
                <button class="mini-btn" onclick="bringToFront()">🔼 置前</button>
                <button class="mini-btn" onclick="sendToBack()">🔽 置後</button>
                <button class="mini-btn" style="color:red" onclick="deleteSelected()">🗑️ 刪除</button>
            </div>
            
            <div class="canvas-wrapper">
                <img id="gifPreview" src="">
                <canvas id="mainCanvas" width="350" height="350"></canvas>
            </div>

            <button class="btn btn-success" onclick="startExport()">💾 下載成品</button>
        </div>

        <div class="sidebar">
            <div class="step-box">
                <span class="step-label">1. 底圖</span>
                <button class="btn btn-primary" onclick="document.getElementById('fileInput').click()">📷 上傳圖片或 GIF</button>
                <input type="file" id="fileInput" hidden accept="image/*" onchange="handleFileUpload(event)">
            </div>

            <div class="step-box">
                <span class="step-label">2. 素材</span>
                <div class="tabs">
                    <div class="tab active" onclick="changeTab('ears', this)">耳朵</div>
                    <div class="tab" onclick="changeTab('eyes', this)">眼睛</div>
                    <div class="tab" onclick="changeTab('noses', this)">鼻子</div>
                    <div class="tab" onclick="changeTab('mouths', this)">嘴巴</div>
                </div>
                <div id="asset-container" class="asset-grid"></div>
            </div>

            <div class="step-box">
                <span class="step-label">3. 文字</span>
                <div style="display:flex; gap:5px; margin-bottom:10px;">
                    <input type="text" id="textInput" value="你好" style="flex:1; padding:8px; border-radius:8px; border:1px solid #ccc;">
                    <input type="color" id="textColor" value="#4f46e5" style="width:40px; height:40px;">
                </div>
                <button class="btn btn-primary" onclick="addNewText()">➕ 加入文字</button>
            </div>
        </div>
    </div>

    <script>
        const GIFSHOT_URL = "https://cdnjs.cloudflare.com/ajax/libs/gifshot/0.4.5/gifshot.min.js";
        const pagesBase = 'https://xxz14701.github.io/addpic02/images/';
        const assetManifest = {
            ears: ['ear_01.png', 'ear_02.png', 'ear_03.png', 'ear_04.png', 'ear_05.png', 'ear_06.png', 'ear_07.png', 'ear_08.png', 'ear_09.png', 'ear_010.png', 'ear_011.png', 'ear_012.png', 'ear_013.png', 'ear_014.png'], 
            eyes: ['eye_01.png', 'eye_02.png', 'eye_03.png', 'eye_04.png', 'eye_05.png', 'eye_06.png', 'eye_07.png', 'eye_08.png', 'eye_09.png', 'eye_010.png', 'eye_011.png', 'eye_012.png', 'eye_013.png', 'eye_014.png', 'eye_015.png', 'eye_016.png', 'eye_017.png', 'eye_018.png', 'eye_019.png'],
            noses: ['nose_01.png', 'nose_02.png', 'nose_03.png', 'nose_04.png', 'nose_05.png'],
            mouths: ['mouth_01.png', 'mouth_02.png', 'mouth_03.png', 'mouth_04.png', 'mouth_05.png', 'mouth_06.png', 'mouth_07.png', 'mouth_08.png', 'mouth_09.png', 'mouth_010.png']
        };

        let canvas;
        let isGifMode = false;
        let currentFileUrl = '';

        window.onload = function() {
            canvas = new fabric.Canvas('mainCanvas', { 
                backgroundColor: 'rgba(0,0,0,0)', 
                preserveObjectStacking: true 
            });
            renderAssetGrid('ears');
        };

        function handleFileUpload(e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(f) {
                currentFileUrl = f.target.result;
                const preview = document.getElementById('gifPreview');
                if (file.type === 'image/gif') {
                    isGifMode = true;
                    preview.src = currentFileUrl;
                    preview.style.display = 'block';
                    canvas.getObjects().forEach(o => { if(o.isBg) canvas.remove(o); });
                } else {
                    isGifMode = false;
                    preview.style.display = 'none';
                    fabric.Image.fromURL(currentFileUrl, (img) => {
                        img.scaleToWidth(350);
                        img.set({ left: 175, top: 175, originX: 'center', originY: 'center', isBg: true });
                        canvas.add(img);
                        img.sendToBack();
                    }, { crossOrigin: 'anonymous' }); // 關鍵：避免畫布污染
                }
                canvas.renderAll();
            };
            reader.readAsDataURL(file);
        }

        async function startExport() {
            if (!currentFileUrl) return alert("請先上傳底圖！");
            
            // 下載機制檢查
            if (typeof gifshot === 'undefined' && isGifMode) {
                alert("GIF 組件載入中，請稍候再試。如果您是在本地打開 HTML，請將程式上傳到 GitHub Pages 執行。");
                return;
            }

            document.getElementById('loadingOverlay').style.display = 'flex';

            if (isGifMode) {
                document.getElementById('loadingText').innerText = "正在合成 GIF，請稍候...";
                
                // 隱藏背景圖層進行截圖
                const bgObj = canvas.getObjects().find(o => o.isBg);
                if(bgObj) bgObj.visible = false;
                canvas.discardActiveObject();
                canvas.renderAll();
                const overlay = canvas.toDataURL({ format: 'png' });
                if(bgObj) bgObj.visible = true;
                canvas.renderAll();

                gifshot.createGIF({
                    images: [currentFileUrl], // 改用 images 處理單圖轉多幀或 GIF 再製
                    video: isGifMode ? [currentFileUrl] : [],
                    gifWidth: 350, gifHeight: 350,
                    numFrames: 10, 
                    overlay: [overlay], 
                    interval: 0.1,
                    sampleInterval: 10,
                    progressCallback: (prog) => {
                        document.getElementById('loadingText').innerText = `合成進度: ${Math.round(prog * 100)}%`;
                    }
                }, function(obj) {
                    document.getElementById('loadingOverlay').style.display = 'none';
                    if (!obj.error) {
                        const link = document.createElement('a');
                        link.download = 'my_animated_sticker.gif';
                        link.href = obj.image;
                        link.click();
                    } else {
                        console.error(obj.errorMsg);
                        alert("合成失敗，這通常是瀏覽器安全限制導致。請將專案託管在 GitHub Pages 上使用。");
                    }
                });
            } else {
                canvas.discardActiveObject();
                const dataURL = canvas.toDataURL({ format: 'png', quality: 1.0 });
                const link = document.createElement('a');
                link.download = 'my_sticker.png';
                link.href = dataURL;
                link.click();
                document.getElementById('loadingOverlay').style.display = 'none';
            }
        }

        function renderAssetGrid(category) {
            const container = document.getElementById('asset-container');
            container.innerHTML = '';
            assetManifest[category].forEach(f => {
                const url = `${pagesBase}${category}/${f}`;
                const img = document.createElement('img');
                img.src = url;
                img.className = 'sticker-item';
                img.onclick = () => {
                    fabric.Image.fromURL(url, (i) => {
                        i.scale(0.5).set({ left: 175, top: 175, originX: 'center', originY: 'center' });
                        canvas.add(i);
                        canvas.setActiveObject(i);
                    }, { crossOrigin: 'anonymous' }); // 關鍵：跨域處理
                };
                container.appendChild(img);
            });
        }

        function changeTab(cat, el) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            el.classList.add('active');
            renderAssetGrid(cat);
        }

        function addNewText() {
            const t = new fabric.IText(document.getElementById('textInput').value, {
                left: 175, top: 175, originX: 'center',
                fill: document.getElementById('textColor').value,
                fontFamily: 'sans-serif', fontWeight: 'bold'
            });
            canvas.add(t);
            canvas.setActiveObject(t);
            canvas.renderAll();
        }

        function bringToFront() { canvas.getActiveObject()?.bringToFront(); canvas.renderAll(); }
        function sendToBack() { 
            const obj = canvas.getActiveObject();
            if(obj && !obj.isBg) { obj.sendToBack(); canvas.renderAll(); }
        }
        function deleteSelected() { 
            canvas.remove(...canvas.getActiveObjects()); 
            canvas.discardActiveObject(); 
            canvas.renderAll(); 
        }
    </script>
</body>
</html>
