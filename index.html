<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="shortcut icon" href="01.png">
    <title>創意表情設計器</title>
    
    <!-- 基礎庫：Fabric.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>
    
    <!-- GIF 處理庫：設定主要與備用來源 -->
    <script id="gifshot-main" src="https://cdnjs.cloudflare.com/ajax/libs/gifshot/0.4.5/gifshot.min.js"></script>
    
    <style>
        :root {
            --primary: #4f46e5;
            --success: #16a34a;
            --danger: #dc2626;
            --warning: #d97706;
            --bg: #f1f5f9;
            --card: #ffffff;
            --text: #0f172a;
        }

        body {
            font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            touch-action: manipulation;
        }

        .header { text-align: center; margin-bottom: 20px; width: 100%; }
        .header h1 { margin: 0; font-size: 28px; color: var(--primary); }

        .main-container {
            display: flex;
            gap: 20px;
            max-width: 1100px;
            width: 100%;
            flex-wrap: wrap;
            justify-content: center;
        }

        .canvas-section {
            background: var(--card);
            padding: 20px;
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            align-items: center;
            flex: 1;
            min-width: 380px;
        }

        .canvas-wrapper {
            border: 4px solid #e2e8f0;
            border-radius: 16px;
            overflow: hidden;
            margin-bottom: 20px;
            position: relative;
            background-color: #fff;
            width: 370px;
            height: 320px;
        }

        #gifPreview {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 1;
            object-fit: contain;
            display: none;
            pointer-events: none;
        }

        .canvas-container {
            z-index: 10 !important;
        }

        .sidebar {
            width: 380px;
            background: var(--card);
            padding: 24px;
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .step-box {
            border: 2px solid #f1f5f9;
            border-radius: 16px;
            padding: 15px;
            position: relative;
        }

        .step-label {
            position: absolute;
            top: -12px; left: 15px;
            background: var(--primary);
            color: white;
            padding: 2px 12px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: bold;
        }

        .tabs {
            display: flex; gap: 5px;
            background: #f1f5f9;
            padding: 5px;
            border-radius: 12px;
            margin-bottom: 12px;
        }

        .tab {
            flex: 1; padding: 10px 5px;
            text-align: center; cursor: pointer;
            border-radius: 8px; font-size: 16px;
            font-weight: bold; color: #64748b;
        }

        .tab.active { background: var(--primary); color: white; }

        .asset-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            max-height: 250px;
            overflow-y: auto;
            padding: 5px;
        }

        .sticker-item {
            aspect-ratio: 1;
            border: 2px solid #f1f5f9;
            border-radius: 12px;
            cursor: pointer;
            padding: 5px;
            background: #fff;
            width: 100%;
            object-fit: contain;
        }

        .btn {
            padding: 15px 20px;
            border: none;
            border-radius: 16px;
            font-weight: 800;
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
        }

        .btn-primary { background: var(--primary); color: white; }
        .btn-success { background: var(--success); color: white; }
        .btn-warning { background: var(--warning); color: white; }

        .layer-controls { display: flex; gap: 10px; margin-bottom: 15px; width: 100%; }
        
        .mini-btn { 
            flex: 1; padding: 12px 5px; font-size: 14px; 
            font-weight: bold; border-radius: 12px; 
            border: 2px solid #e2e8f0; background: white; cursor: pointer; 
        }

        #loadingOverlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            color: white;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 99999;
        }

        .spinner {
            width: 50px; height: 50px;
            border: 5px solid #f3f3f3;
            border-top: 5px solid var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 15px;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        #fileInput { display: none; }
    </style>
</head>
<body>

    <div id="loadingOverlay">
        <div class="spinner"></div>
        <div id="loadingText">正在處理中...</div>
    </div>

    <div class="header">
        <h1>創意貼圖設計器</h1>
    </div>

    <div class="main-container">
        <div class="canvas-section">
            <div class="layer-controls">
                <button class="mini-btn" onclick="bringToFront()">🔼 前移</button>
                <button class="mini-btn" onclick="sendToBack()">🔽 後移</button>
                <button class="mini-btn" style="color:red;" onclick="deleteSelected()">🗑️ 刪除</button>
            </div>
            
            <div class="canvas-wrapper">
                <img id="gifPreview" src="">
                <canvas id="mainCanvas" width="370" height="320"></canvas>
            </div>

            <button class="btn btn-success" id="exportBtn" onclick="exportFinal()">💾 下載成品 (PNG/GIF)</button>
        </div>

        <div class="sidebar">
            <div class="step-box">
                <span class="step-label">1. 底圖</span>
                <button class="btn btn-primary" onclick="document.getElementById('fileInput').click()">📷 上傳照片或 GIF</button>
                <input type="file" id="fileInput" accept="image/*" onchange="handleFileUpload(event)">
            </div>

            <div class="step-box">
                <span class="step-label">2. 素材</span>
                <div class="tabs">
                    <div class="tab active" onclick="changeTab('ears', this)">耳朵</div>
                    <div class="tab" onclick="changeTab('eyes', this)">眼睛</div>
                    <div class="tab" onclick="changeTab('noses', this)">鼻子</div>
                    <div class="tab" onclick="changeTab('mouths', this)">嘴巴</div>
                </div>
                <div id="asset-container" class="asset-grid"></div>
            </div>

            <div class="step-box">
                <span class="step-label">3. 文字</span>
                <div style="display:flex; gap:10px; margin-bottom:10px;">
                    <input type="text" id="textInput" value="你好" style="flex:1; padding:10px; border-radius:12px; border:2px solid #ddd;" onkeyup="updateActiveText()">
                    <input type="color" id="textColor" value="#4f46e5" style="width:45px; height:45px;">
                </div>
                <button class="btn btn-primary" onclick="addNewText()">➕ 加入文字</button>
            </div>
        </div>
    </div>

    <script>
        // 備用腳本加載機制
        window.addEventListener('error', function(e) {
            if (e.target.id === 'gifshot-main') {
                console.log('主要 GIF 庫加載失敗，切換至備用來源...');
                const backup = document.createElement('script');
                backup.src = 'https://cdn.jsdelivr.net/npm/gifshot@0.4.5/dist/gifshot.min.js';
                document.head.appendChild(backup);
            }
        }, true);

        const pagesBase = 'https://xxz14701.github.io/addpic02/images/';
        const assetManifest = {
            ears: ['ear_01.png', 'ear_02.png', 'ear_03.png', 'ear_04.png', 'ear_05.png', 'ear_06.png', 'ear_07.png', 'ear_08.png', 'ear_09.png', 'ear_010.png', 'ear_011.png', 'ear_012.png', 'ear_013.png', 'ear_014.png'], 
            eyes: ['eye_01.png', 'eye_02.png', 'eye_03.png', 'eye_04.png', 'eye_05.png', 'eye_06.png', 'eye_07.png', 'eye_08.png', 'eye_09.png', 'eye_010.png', 'eye_011.png', 'eye_012.png', 'eye_013.png', 'eye_014.png', 'eye_015.png', 'eye_016.png', 'eye_017.png', 'eye_018.png', 'eye_019.png'],
            noses: ['nose_01.png', 'nose_02.png', 'nose_03.png', 'nose_04.png', 'nose_05.png'],
            mouths: ['mouth_01.png', 'mouth_02.png', 'mouth_03.png', 'mouth_04.png', 'mouth_05.png', 'mouth_06.png', 'mouth_07.png', 'mouth_08.png', 'mouth_09.png', 'mouth_010.png']
        };

        let canvas;
        let isGifMode = false;
        let baseFileUrl = '';

        window.onload = function() {
            // 修正 Fabric 效能警告
            const originalGetContext = HTMLCanvasElement.prototype.getContext;
            HTMLCanvasElement.prototype.getContext = function(type, options) {
                if (type === '2d') {
                    options = options || {};
                    options.willReadFrequently = true;
                }
                return originalGetContext.call(this, type, options);
            };

            canvas = new fabric.Canvas('mainCanvas', { 
                preserveObjectStacking: true,
                backgroundColor: 'transparent'
            });
            renderAssetGrid('ears');
        };

        function handleFileUpload(e) {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(f) {
                baseFileUrl = f.target.result;
                const preview = document.getElementById('gifPreview');
                
                if (file.type === 'image/gif') {
                    isGifMode = true;
                    preview.src = baseFileUrl;
                    preview.style.display = 'block';
                    canvas.getObjects().forEach(o => { if(o.isBg) canvas.remove(o); });
                } else {
                    isGifMode = false;
                    preview.style.display = 'none';
                    fabric.Image.fromURL(baseFileUrl, function(img) {
                        img.scaleToWidth(350);
                        img.set({ left: 185, top: 160, originX: 'center', originY: 'center', isBg: true });
                        canvas.add(img);
                        img.sendToBack();
                        canvas.renderAll();
                    }, { crossOrigin: 'anonymous' });
                }
            };
            reader.readAsDataURL(file);
        }

        async function exportFinal() {
            if (!baseFileUrl && canvas.getObjects().length === 0) return alert("還沒上傳底圖或添加裝飾喔！");

            if (isGifMode) {
                if (typeof gifshot === 'undefined') {
                    alert("GIF 處理組件尚未載入完成。這可能是因為連線至外部腳本庫被阻擋，建議您將 gifshot.min.js 下載後放到您的 GitHub 專案中。");
                    return;
                }

                document.getElementById('loadingOverlay').style.display = 'flex';
                document.getElementById('loadingText').innerText = "正在合成 GIF 動圖 (這可能需要 10-20 秒)...";

                canvas.discardActiveObject();
                // 暫時隱藏底圖圖層，只擷取裝飾層
                const bgs = canvas.getObjects().filter(o => o.isBg);
                bgs.forEach(b => b.visible = false);
                canvas.renderAll();
                const overlay = canvas.toDataURL({ format: 'png' });
                bgs.forEach(b => b.visible = true);
                canvas.renderAll();

                gifshot.createGIF({
                    gifWidth: 370, 
                    gifHeight: 320,
                    video: [baseFileUrl], // GIF 底圖作為來源
                    numFrames: 10, 
                    interval: 0.1,
                    overlay: [overlay]
                }, function(obj) {
                    document.getElementById('loadingOverlay').style.display = 'none';
                    if (!obj.error) {
                        const link = document.createElement('a');
                        link.download = 'my_gif_sticker.gif';
                        link.href = obj.image;
                        link.click();
                    } else {
                        alert("合成失敗：" + obj.errorMsg);
                    }
                });
            } else {
                canvas.discardActiveObject();
                canvas.renderAll();
                const link = document.createElement('a');
                link.download = 'my_sticker.png';
                link.href = canvas.toDataURL({ format: 'png', quality: 1.0 });
                link.click();
            }
        }

        function renderAssetGrid(category) {
            const container = document.getElementById('asset-container');
            container.innerHTML = '';
            assetManifest[category].forEach(fn => {
                const url = `${pagesBase}${category}/${fn}`;
                const img = document.createElement('img');
                img.src = url;
                img.className = 'sticker-item';
                img.onclick = () => {
                    fabric.Image.fromURL(url, (i) => {
                        i.scale(0.6).set({ left: 185, top: 160, originX: 'center', originY: 'center' });
                        canvas.add(i);
                        canvas.setActiveObject(i);
                        canvas.renderAll();
                    }, { crossOrigin: 'anonymous' });
                };
                container.appendChild(img);
            });
        }

        function changeTab(cat, el) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            el.classList.add('active');
            renderAssetGrid(cat);
        }

        function addNewText() {
            const t = new fabric.IText(document.getElementById('textInput').value, {
                left: 185, top: 160, originX: 'center', originY: 'center',
                fontSize: 50, fill: document.getElementById('textColor').value,
                fontWeight: 'bold', fontFamily: 'sans-serif'
            });
            canvas.add(t);
            canvas.setActiveObject(t);
            canvas.renderAll();
        }

        function updateActiveText() {
            const obj = canvas.getActiveObject();
            if (obj && obj.type === 'i-text') {
                obj.set({ text: document.getElementById('textInput').value });
                canvas.renderAll();
            }
        }

        function bringToFront() { canvas.getActiveObject()?.bringToFront(); canvas.renderAll(); }
        function sendToBack() { 
            const obj = canvas.getActiveObject();
            if(obj && !obj.isBg) { obj.sendToBack(); canvas.renderAll(); }
        }
        function deleteSelected() { 
            canvas.remove(...canvas.getActiveObjects()); 
            canvas.discardActiveObject(); 
            canvas.renderAll(); 
        }
    </script>
</body>
</html>
