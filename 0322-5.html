<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>創意 GIF 貼圖設計器</title>
    <!-- 核心庫 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>
    <!-- GIF 處理庫 - 使用穩定 CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gifshot/0.4.5/gifshot.min.js"></script>
    <style>
        :root {
            --primary: #4f46e5;
            --success: #16a34a;
            --danger: #dc2626;
            --warning: #d97706;
            --bg: #f1f5f9;
            --card: #ffffff;
            --text: #0f172a;
        }

        body {
            font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            touch-action: manipulation;
        }

        .header { text-align: center; margin-bottom: 20px; width: 100%; }
        .header h1 { margin: 0; font-size: 28px; color: var(--primary); }

        .main-container {
            display: flex;
            gap: 20px;
            max-width: 1100px;
            width: 100%;
            flex-wrap: wrap;
            justify-content: center;
        }

        .canvas-section {
            background: var(--card);
            padding: 20px;
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            align-items: center;
            flex: 1;
            min-width: 320px;
        }

        .canvas-wrapper {
            border: 4px solid #e2e8f0;
            border-radius: 16px;
            overflow: hidden;
            margin-bottom: 20px;
            position: relative;
            background-color: #fff;
            width: 350px;
            height: 350px;
            background-image: linear-gradient(45deg, #f8fafc 25%, transparent 25%), linear-gradient(-45deg, #f8fafc 25%, transparent 25%), linear-gradient(45deg, transparent 75%, #f8fafc 75%), linear-gradient(-45deg, transparent 75%, #f8fafc 75%);
            background-size: 20px 20px;
        }

        /* 重要：Fabric 容器層級 */
        .canvas-container {
            z-index: 10 !important;
            position: absolute !important;
            top: 0;
            left: 0;
        }

        #gifPreview {
            position: absolute;
            top: 0;
            left: 0;
            width: 350px;
            height: 350px;
            z-index: 1;
            object-fit: contain;
            pointer-events: none; /* 讓點擊穿透到畫布 */
            display: none;
        }

        .sidebar {
            width: 380px;
            background: var(--card);
            padding: 24px;
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .step-box {
            border: 2px solid #f1f5f9;
            border-radius: 16px;
            padding: 15px;
            position: relative;
        }

        .step-label {
            position: absolute;
            top: -12px;
            left: 15px;
            background: var(--primary);
            color: white;
            padding: 2px 12px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: bold;
        }

        .input-row { display: flex; gap: 10px; align-items: center; margin-bottom: 10px; }
        
        input[type="text"] {
            flex: 1;
            padding: 12px 15px;
            border: 2px solid #cbd5e1;
            border-radius: 12px;
            font-size: 18px;
        }
        
        input[type="color"] {
            width: 50px; height: 50px;
            border: 2px solid #cbd5e1;
            border-radius: 12px;
            cursor: pointer;
            padding: 2px;
        }

        .tabs {
            display: flex; gap: 5px;
            background: #f1f5f9;
            padding: 5px;
            border-radius: 12px;
            margin-bottom: 12px;
        }

        .tab {
            flex: 1; padding: 10px 5px;
            text-align: center; cursor: pointer;
            border-radius: 8px; font-size: 14px;
            font-weight: bold; transition: 0.3s;
            color: #64748b;
        }

        .tab.active { background: var(--primary); color: white; }

        .asset-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            max-height: 200px;
            overflow-y: auto;
            padding: 5px;
        }

        .sticker-item {
            aspect-ratio: 1;
            border: 2px solid #f1f5f9;
            border-radius: 12px;
            cursor: pointer;
            padding: 5px;
            background: #fff;
            width: 100%;
            object-fit: contain;
        }

        .sticker-item:hover { border-color: var(--primary); }

        .btn {
            padding: 15px 20px;
            border: none;
            border-radius: 16px;
            font-weight: 800;
            font-size: 18px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
        }

        .btn-primary { background: var(--primary); color: white; }
        .btn-success { background: var(--success); color: white; }
        .btn-warning { background: var(--warning); color: white; }

        .layer-controls { display: flex; gap: 10px; margin-bottom: 15px; width: 100%; }
        
        .mini-btn { 
            flex: 1;
            padding: 10px 5px; 
            font-size: 13px; 
            font-weight: bold;
            border-radius: 10px; 
            border: 1px solid #e2e8f0; 
            background: white; 
            cursor: pointer; 
        }

        #loadingOverlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            color: white;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10000;
            text-align: center;
            padding: 20px;
        }

        .spinner {
            width: 50px; height: 50px;
            border: 5px solid #f3f3f3;
            border-top: 5px solid var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 15px;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        @media (max-width: 600px) {
            .sidebar { width: 100%; padding: 15px; }
            .canvas-wrapper { width: 300px; height: 300px; }
            #gifPreview { width: 300px; height: 300px; }
        }
    </style>
</head>
<body>

    <div id="loadingOverlay">
        <div class="spinner"></div>
        <div id="loadingText">正在合成 GIF 動畫...<br><span style="font-size: 14px; color: #aaa;">這可能需要幾秒鐘，請勿離開頁面</span></div>
    </div>

    <div class="header">
        <h1>創意 GIF 貼圖設計</h1>
    </div>

    <div class="main-container">
        <div class="canvas-section">
            <div class="layer-controls">
                <button class="mini-btn" onclick="bringToFront()">🔼 最前</button>
                <button class="mini-btn" onclick="sendToBack()">🔽 最後</button>
                <button class="mini-btn" style="color:red;" onclick="deleteSelected()">🗑️ 刪除</button>
                <button class="mini-btn" onclick="resetCanvas()">🔄 清空</button>
            </div>
            
            <div class="canvas-wrapper">
                <img id="gifPreview" src="">
                <canvas id="mainCanvas" width="350" height="350"></canvas>
            </div>

            <div style="width: 100%; display: flex; flex-direction: column; gap: 10px;">
                <button class="btn btn-success" onclick="startExport()">💾 下載成品 (自動判斷格式)</button>
            </div>
        </div>

        <div class="sidebar">
            <div class="step-box">
                <span class="step-label">1. 底圖</span>
                <button class="btn btn-primary" onclick="document.getElementById('fileInput').click()">📷 上傳照片或 GIF 動畫</button>
                <input type="file" id="fileInput" hidden accept="image/*" onchange="handleFileUpload(event)">
            </div>

            <div class="step-box">
                <span class="step-label">2. 插圖素材</span>
                <div class="tabs">
                    <div class="tab active" onclick="changeTab('ears', this)">耳朵</div>
                    <div class="tab" onclick="changeTab('eyes', this)">眼睛</div>
                    <div class="tab" onclick="changeTab('noses', this)">鼻子</div>
                    <div class="tab" onclick="changeTab('mouths', this)">嘴巴</div>
                </div>
                <div id="asset-container" class="asset-grid"></div>
            </div>

            <div class="step-box">
                <span class="step-label">3. 文字與字型</span>
                <div class="input-row">
                    <input type="text" id="textInput" value="早安" placeholder="輸入文字..." onkeyup="updateActiveText()">
                    <input type="color" id="textColor" value="#4f46e5" onchange="updateActiveText()">
                </div>
                <div style="margin-bottom: 10px;">
                    <button class="btn btn-warning" style="font-size: 14px; padding: 10px;" onclick="document.getElementById('fontInput').click()">🔠 上傳自訂字型 (.ttf/.otf)</button>
                    <input type="file" id="fontInput" hidden accept=".ttf,.otf" onchange="handleFontUpload(event)">
                </div>
                <button class="btn btn-primary" onclick="addNewText()">➕ 加入文字</button>
            </div>
        </div>
    </div>

    <script>
        const pagesBase = 'https://xxz14701.github.io/addpic02/images/';
        const assetManifest = {
            ears: ['ear_01.png', 'ear_02.png', 'ear_03.png', 'ear_04.png', 'ear_05.png', 'ear_06.png', 'ear_07.png', 'ear_08.png', 'ear_09.png', 'ear_010.png', 'ear_011.png', 'ear_012.png', 'ear_013.png', 'ear_014.png'], 
            eyes: ['eye_01.png', 'eye_02.png', 'eye_03.png', 'eye_04.png', 'eye_05.png', 'eye_06.png', 'eye_07.png', 'eye_08.png', 'eye_09.png', 'eye_010.png', 'eye_011.png', 'eye_012.png', 'eye_013.png', 'eye_014.png', 'eye_015.png', 'eye_016.png', 'eye_017.png', 'eye_018.png', 'eye_019.png'],
            noses: ['nose_01.png', 'nose_02.png', 'nose_03.png', 'nose_04.png', 'nose_05.png'],
            mouths: ['mouth_01.png', 'mouth_02.png', 'mouth_03.png', 'mouth_04.png', 'mouth_05.png', 'mouth_06.png', 'mouth_07.png', 'mouth_08.png', 'mouth_09.png', 'mouth_010.png']
        };

        let canvas;
        let isGifMode = false;
        let currentFileUrl = '';
        let customFontCount = 0;

        window.onload = function() {
            canvas = new fabric.Canvas('mainCanvas', {
                backgroundColor: 'rgba(0,0,0,0)',
                preserveObjectStacking: true
            });
            renderAssetGrid('ears');

            // 監聽選取事件
            canvas.on('selection:created', (e) => onObjectSelected(e.selected[0]));
            canvas.on('selection:updated', (e) => onObjectSelected(e.selected[0]));
        };

        function onObjectSelected(obj) {
            if (obj && obj.type === 'i-text') {
                document.getElementById('textInput').value = obj.text;
                document.getElementById('textColor').value = obj.fill;
            }
        }

        function handleFileUpload(e) {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(f) {
                currentFileUrl = f.target.result;
                const preview = document.getElementById('gifPreview');
                
                if (file.type === 'image/gif') {
                    isGifMode = true;
                    preview.src = currentFileUrl;
                    preview.style.display = 'block';
                    // 移除畫布中的靜態底圖
                    canvas.getObjects().forEach(obj => { if(obj.isBg) canvas.remove(obj); });
                    canvas.renderAll();
                } else {
                    isGifMode = false;
                    preview.style.display = 'none';
                    fabric.Image.fromURL(currentFileUrl, (img) => {
                        if (img.width > 350) img.scaleToWidth(350);
                        img.set({ 
                            left: 175, top: 175, 
                            originX: 'center', originY: 'center', 
                            selectable: true,
                            isBg: true 
                        });
                        canvas.add(img);
                        img.sendToBack();
                        canvas.renderAll();
                    });
                }
            };
            reader.readAsDataURL(file);
        }

        function handleFontUpload(e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(event) {
                const fontName = 'CustomFont' + customFontCount++;
                const fontFace = new FontFace(fontName, event.target.result);
                fontFace.load().then(function(loaded) {
                    document.fonts.add(loaded);
                    const obj = canvas.getActiveObject();
                    if (obj && obj.type === 'i-text') {
                        obj.set('fontFamily', fontName);
                        canvas.renderAll();
                    }
                });
            };
            reader.readAsArrayBuffer(file);
        }

        function startExport() {
            if (!currentFileUrl) return alert("請先上傳底圖！");
            
            // 安全檢查
            if (isGifMode && typeof gifshot === 'undefined') {
                alert("GIF 庫載入失敗，請嘗試重新整理頁面。");
                return;
            }

            if (!isGifMode) {
                canvas.discardActiveObject();
                canvas.renderAll();
                const dataURL = canvas.toDataURL({ format: 'png', quality: 1.0 });
                const link = document.createElement('a');
                link.download = '貼圖成品.png';
                link.href = dataURL;
                link.click();
                return;
            }

            document.getElementById('loadingOverlay').style.display = 'flex';
            
            // 抓取透明裝飾層
            const bgObj = canvas.getObjects().find(o => o.isBg);
            if(bgObj) bgObj.visible = false;
            canvas.discardActiveObject();
            canvas.renderAll();

            const overlayPngData = canvas.toDataURL({ format: 'png' });
            if(bgObj) bgObj.visible = true;
            canvas.renderAll();

            // GIF 合成
            gifshot.createGIF({
                video: [currentFileUrl],
                gifWidth: 350,
                gifHeight: 350,
                numFrames: 15, // 採樣幀數
                overlay: [overlayPngData],
                interval: 0.1,
                sampleInterval: 10
            }, function(obj) {
                document.getElementById('loadingOverlay').style.display = 'none';
                if (!obj.error) {
                    const link = document.createElement('a');
                    link.download = '動態貼圖.gif';
                    link.href = obj.image;
                    link.click();
                } else {
                    alert("合成失敗：" + obj.errorMsg);
                }
            });
        }

        // --- 素材與編輯 ---
        function renderAssetGrid(category) {
            const container = document.getElementById('asset-container');
            container.innerHTML = '';
            assetManifest[category].forEach(fileName => {
                const url = `${pagesBase}${category}/${fileName}`;
                const img = document.createElement('img');
                img.src = url;
                img.className = 'sticker-item';
                img.onclick = () => addSticker(url);
                container.appendChild(img);
            });
        }

        function changeTab(cat, el) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            el.classList.add('active');
            renderAssetGrid(cat);
        }

        function addSticker(url) {
            fabric.Image.fromURL(url, (img) => {
                img.scale(0.5).set({ 
                    left: 175, top: 175, 
                    originX: 'center', originY: 'center',
                    cornerColor: '#4f46e5', cornerSize: 10,
                    transparentCorners: false
                });
                canvas.add(img);
                canvas.setActiveObject(img);
                canvas.renderAll();
            }, { crossOrigin: 'anonymous' });
        }

        function addNewText() {
            const text = new fabric.IText(document.getElementById('textInput').value, {
                left: 175, top: 175, originX: 'center', 
                fill: document.getElementById('textColor').value,
                fontFamily: 'Microsoft JhengHei', fontSize: 40, fontWeight: 'bold',
                cornerColor: '#4f46e5', cornerSize: 10
            });
            canvas.add(text);
            canvas.setActiveObject(text);
            canvas.renderAll();
        }

        function updateActiveText() {
            const obj = canvas.getActiveObject();
            if (obj && obj.type === 'i-text') {
                obj.set({ 
                    text: document.getElementById('textInput').value, 
                    fill: document.getElementById('textColor').value 
                });
                canvas.renderAll();
            }
        }

        function bringToFront() { canvas.getActiveObject()?.bringToFront(); canvas.renderAll(); }
        function sendToBack() { 
            const obj = canvas.getActiveObject();
            if(obj && !obj.isBg) { obj.sendToBack(); canvas.renderAll(); }
        }
        function deleteSelected() { 
            const actives = canvas.getActiveObjects();
            if(actives.length > 0) {
                canvas.remove(...actives);
                canvas.discardActiveObject();
                canvas.renderAll();
            }
        }
        function resetCanvas() { 
            if(confirm('確定要清空嗎？')) { 
                canvas.clear(); 
                document.getElementById('gifPreview').style.display='none'; 
                isGifMode=false; 
                currentFileUrl=''; 
            } 
        }
    </script>
</body>
</html>
